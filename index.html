<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Creator Campaign Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090909;--s1:#131313;--s2:#1d1d1d;--s3:#272727;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.2);
  --t1:#f0f0f0;--t2:rgba(240,240,240,0.5);--t3:rgba(240,240,240,0.25);
  --gold:#C9A84C;--ga:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.32);
  --tt:#69C9D0;--ta:rgba(105,201,208,0.11);
  --ig:#E1306C;--ia:rgba(225,48,108,0.11);
  --sp:#1DB954;--sa:rgba(29,185,84,0.11);
  --red:#e53e3e;--r10:12px;--r14:14px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page{padding:1.75rem 2rem;max-width:1300px;margin:0 auto;animation:up .2s ease}
.card{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r14)}
.pad{padding:1.25rem}
.inp{width:100%;padding:9px 12px;background:var(--s2);border:.5px solid var(--b2);border-radius:var(--r10);color:var(--t1);font-size:13px;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--t3)}
select.inp option{background:var(--s2)}
.bg{background:var(--gold);color:#000;font-weight:700;font-size:13px;padding:8px 16px;border-radius:var(--r10);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s}
.bg:hover{opacity:.88}.bg:disabled{opacity:.45;cursor:not-allowed}
.bo{background:var(--s2);color:var(--t2);border:.5px solid var(--b2);font-size:12px;padding:6px 13px;border-radius:var(--r10);display:inline-flex;align-items:center;gap:5px;transition:border-color .15s}
.bo:hover{border-color:var(--b3)}
.lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px 40px;z-index:999;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#181818;border:.5px solid var(--b2);border-radius:var(--r14);width:100%;padding:1.5rem;box-shadow:0 40px 100px rgba(0,0,0,.8);animation:up .15s ease}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sx{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.hr{height:.5px;background:var(--b1);margin:14px 0}
.spin{animation:spin .7s linear infinite;display:inline-block;line-height:1}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--t3);font-size:13px">Loading…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── CONSTANTS ──────────────────────────────────────────────
const GOLD="#C9A84C",TT="#69C9D0",IG="#E1306C",SP="#1DB954";
const CX="https://api.chartex.com/external/v1";

// ── UTILS ──────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=n=>{n=Number(n)||0;if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return Math.round(n).toLocaleString()};
const spId=u=>(u||"").match(/track\/([A-Za-z0-9]+)/)?.[1]||null;
const ttVid=u=>(u||"").match(/video\/(\d{10,25})/)?.[1]||null;
const ttUser=u=>(u||"").match(/@([^/?&\s]+)/)?.[1]||null;
const igCode=u=>(u||"").match(/\/(p|reel|tv)\/([A-Za-z0-9_-]+)/)?.[2]||null;
const plat=u=>{if(!u)return null;if(u.includes("tiktok.com"))return"tiktok";if(u.includes("instagram.com"))return"instagram";return null};

// ── STORAGE — always persist immediately ───────────────────
const ls=(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const lw=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ── SPOTIFY ────────────────────────────────────────────────
async function spTok(id,sec){
  try{const r=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:`grant_type=client_credentials&client_id=${id}&client_secret=${sec}`});return r.ok?(await r.json()).access_token:null}catch{return null}
}
async function spTrack(tid,tok){
  try{const r=await fetch(`https://api.spotify.com/v1/tracks/${tid}`,{headers:{Authorization:`Bearer ${tok}`}});if(!r.ok)return null;const t=await r.json();return{name:t.name,artist:t.artists?.map(a=>a.name).join(", "),art:t.album?.images?.[0]?.url,pop:t.popularity}}catch{return null}
}

// ── CHARTEX ────────────────────────────────────────────────
async function cxFetch(path,cfg){
  if(!cfg?.cxId||!cfg?.cxToken)return null;
  try{const r=await fetch(CX+path,{headers:{"X-APP-ID":cfg.cxId,"X-APP-TOKEN":cfg.cxToken}});return r.ok?(await r.json()):null}catch{return null}
}
async function cxFindSong(cfg,sid,name){
  const p=sid?`/songs/?spotify_id=${sid}&limit=3`:`/songs/?search=${encodeURIComponent(name||"")}&limit=5`;
  const d=await cxFetch(p,cfg);const a=d?.data?.items||d?.items||(Array.isArray(d)?d:[]);return a[0]||null;
}
async function cxSongStats(cfg,id){const d=await cxFetch(`/songs/${id}/`,cfg);return d?.data||d||null}
async function cxVideoStats(cfg,vid){
  // Try multiple endpoint patterns
  for(const p of [`/tiktok-videos/${vid}/`,`/videos/tiktok/${vid}/`,`/tiktok/videos/${vid}/`]){
    const d=await cxFetch(p,cfg);if(d?.data||typeof d?.play_count!=="undefined")return d?.data||d;
  }
  return null;
}
async function cxIGStats(cfg,code){
  for(const p of [`/instagram-posts/${code}/`,`/instagram/posts/${code}/`,`/ig/posts/${code}/`]){
    const d=await cxFetch(p,cfg);if(d?.data||typeof d?.like_count!=="undefined")return d?.data||d;
  }
  return null;
}

// ── PULL CREATOR POST DATA ─────────────────────────────────
async function pullPost(url,cfg){
  const p=plat(url);if(!p)return null;
  const out={platform:p,postUrl:url,handle:"",thumbnail:null,views:"",likes:"",comments:"",saves:""};

  if(p==="tiktok"){
    const vid=ttVid(url),user=ttUser(url);
    if(user)out.handle=user;
    try{
      const r=await fetch(`https://www.tiktok.com/oembed?url=${encodeURIComponent(url)}`);
      if(r.ok){const d=await r.json();if(d.thumbnail_url)out.thumbnail=d.thumbnail_url;if(d.author_name)out.handle=d.author_name;}
    }catch{}
    if(vid&&cfg?.cxId){
      const s=await cxVideoStats(cfg,vid);
      if(s){
        out.views=s.play_count||s.view_count||s.views||"";
        out.likes=s.digg_count||s.like_count||s.likes||"";
        out.comments=s.comment_count||s.comments||"";
        out.saves=s.collect_count||s.saves||"";
      }
    }
  }

  if(p==="instagram"){
    const code=igCode(url);
    try{
      const r=await fetch(`https://api.instagram.com/oembed/?url=${encodeURIComponent(url)}&omitscript=true`);
      if(r.ok){const d=await r.json();if(d.thumbnail_url)out.thumbnail=d.thumbnail_url;if(d.author_name)out.handle=d.author_name;}
    }catch{}
    if(code&&cfg?.cxId){
      const s=await cxIGStats(cfg,code);
      if(s){
        out.views=s.video_view_count||s.views||"";
        out.likes=s.like_count||s.likes||"";
        out.comments=s.comment_count||s.comments||"";
        out.saves=s.saves||"";
      }
    }
  }
  return out;
}

// ── ICONS ──────────────────────────────────────────────────
const Tt=({s=16,c=TT})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.26 8.26 0 004.84 1.56V6.8a4.85 4.85 0 01-1.07-.11z"/></svg>;
const Ig=({s=16,c=IG})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>;
const Sp=({s=16,c=SP})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>;
const Ref=({s=13,c="currentColor",spin})=><svg className={spin?"spin":""} width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>;
const Pen=({s=12,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

const platCfg={
  tiktok:{label:"TikTok",grad:"linear-gradient(150deg,#0d0d20,#3d2c8d,#ee1d52)",I:Tt},
  instagram:{label:"Instagram",grad:"linear-gradient(150deg,#833ab4,#fd1d1d,#fcb045)",I:Ig},
  youtube:{label:"YouTube",grad:"linear-gradient(150deg,#c4302b,#ff9900)",I:({s,c})=><span style={{fontSize:s,color:c}}>▶</span>},
  twitter:{label:"X/Twitter",grad:"linear-gradient(150deg,#1da1f2,#14171a)",I:({s,c})=><span style={{fontSize:s,color:c,fontWeight:700}}>𝕏</span>},
};

// ── MODAL ──────────────────────────────────────────────────
function Modal({title,onClose,children,mw=500}){
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:mw}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
          <h2 style={{fontSize:16,fontWeight:700}}>{title}</h2>
          <button className="bo" onClick={onClose} style={{padding:"3px 10px",fontSize:15}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── SETTINGS MODAL ─────────────────────────────────────────
function SettingsModal({cur,onSave,onClose}){
  const[f,setF]=useState(cur||{spId:"",spSec:"",cxId:"",cxToken:""});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(
    <Modal title="API Credentials" onClose={onClose} mw={560}>
      <p style={{fontSize:12,color:"var(--t2)",marginBottom:16,lineHeight:1.65}}>Stored locally in your browser — never sent anywhere except the respective APIs.</p>
      <div style={{background:"var(--s2)",borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}><Sp s={13} c={SP}/><span style={{fontSize:10,fontWeight:700,color:SP,textTransform:"uppercase",letterSpacing:".06em"}}>Spotify API</span></div>
        <div className="g2"><div><label className="lbl">Client ID</label><input className="inp" placeholder="Spotify Client ID" value={f.spId} onChange={s("spId")}/></div><div><label className="lbl">Client Secret</label><input className="inp" type="password" placeholder="••••••" value={f.spSec} onChange={s("spSec")}/></div></div>
        <p style={{fontSize:11,color:"var(--t3)",marginTop:7}}>Pulls: track name, album art, artist, popularity score</p>
      </div>
      <div style={{background:"var(--s2)",borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}><Tt s={13} c={TT}/><span style={{fontSize:10,fontWeight:700,color:TT,textTransform:"uppercase",letterSpacing:".06em"}}>Chartex API</span></div>
        <div className="g2"><div><label className="lbl">App ID</label><input className="inp" placeholder="Chartex App ID" value={f.cxId} onChange={s("cxId")}/></div><div><label className="lbl">App Token</label><input className="inp" type="password" placeholder="••••••" value={f.cxToken} onChange={s("cxToken")}/></div></div>
        <p style={{fontSize:11,color:"var(--t3)",marginTop:7}}>Pulls: TikTok sound total creates, IG reels count, individual video metrics</p>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button className="bo" onClick={onClose}>Cancel</button>
        <button className="bg" onClick={()=>onSave(f)}>Save Credentials</button>
      </div>
    </Modal>
  );
}

// ── POST FORM (shared between Add and Edit) ─────────────────
function PostForm({initial,onSubmit,onClose,cfg,submitLabel}){
  const[url,setUrl]=useState(initial?.postUrl||"");
  const[st,setSt]=useState(initial?.postUrl?"done":"idle"); // idle|fetching|done|error
  const[f,setF]=useState({
    platform:initial?.platform||"tiktok",
    handle:initial?.handle||"",
    thumbnail:initial?.thumbnail||"",
    views:initial?.views||"",
    likes:initial?.likes||"",
    comments:initial?.comments||"",
    saves:initial?.saves||"",
  });
  const db=useRef(null);
  const sf=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const doFetch=useCallback(async raw=>{
    const u=raw.trim();if(!plat(u)){setSt("idle");return}
    setSt("fetching");
    const d=await pullPost(u,cfg);
    if(d){
      setF(prev=>({...prev,
        platform:d.platform||prev.platform,
        handle:d.handle||prev.handle,
        thumbnail:d.thumbnail||prev.thumbnail,
        views:d.views!==undefined?String(d.views):prev.views,
        likes:d.likes!==undefined?String(d.likes):prev.likes,
        comments:d.comments!==undefined?String(d.comments):prev.comments,
        saves:d.saves!==undefined?String(d.saves):prev.saves,
      }));
      setSt("done");
    } else setSt("error");
  },[cfg]);

  const onUrlChange=e=>{
    const v=e.target.value;setUrl(v);
    clearTimeout(db.current);
    if(v.trim().length>20&&plat(v)){setSt("fetching");db.current=setTimeout(()=>doFetch(v),800)}
    else setSt("idle");
  };

  const vv=Number(f.views)||0,lk=Number(f.likes)||0,cm=Number(f.comments)||0;
  const er=vv>0?((lk+cm)/vv*100).toFixed(2)+"%":"—";
  const P=platCfg[f.platform]||platCfg.tiktok;
  const stC={idle:"var(--t3)",fetching:GOLD,done:SP,error:IG};
  const stM={idle:"Paste TikTok or Instagram link — handle & thumbnail pull automatically",fetching:"Fetching post data…",done:"✓ Post data loaded — review & edit any field below",error:"Couldn't auto-pull metrics. Fill in manually or check if post is public."};

  return(
    <>
      <div style={{marginBottom:14}}>
        <label className="lbl">Post URL</label>
        <div style={{position:"relative"}}>
          <input className="inp" placeholder="https://www.instagram.com/reel/... or tiktok.com/@creator/video/..." value={url} onChange={onUrlChange} style={{paddingRight:34}}/>
          {st==="fetching"&&<span className="spin" style={{position:"absolute",right:10,top:"50%",marginTop:-7}}><Ref s={14} c={GOLD}/></span>}
          {st==="done"&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:SP,fontWeight:700}}>✓</span>}
        </div>
        <p style={{fontSize:11,marginTop:5,color:stC[st],fontWeight:st==="idle"?400:600}}>{stM[st]}</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"175px 1fr",gap:18,alignItems:"start"}}>
        {/* 9:16 live preview */}
        <div>
          <label className="lbl">Preview</label>
          <div style={{width:175,height:311,borderRadius:10,overflow:"hidden",position:"relative",background:f.thumbnail?`url(${f.thumbnail}) center/cover no-repeat`:P.grad,border:".5px solid var(--b2)"}}>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%)"}}/>
            <div style={{position:"absolute",top:9,left:9,background:"rgba(0,0,0,.68)",borderRadius:6,padding:"3px 8px",display:"flex",alignItems:"center",gap:4}}>
              <P.I s={11} c="#fff"/><span style={{color:"#fff",fontSize:10,fontWeight:700}}>{P.label}</span>
            </div>
            <div style={{position:"absolute",bottom:10,left:10,right:10}}>
              <p style={{color:"#fff",fontSize:13,fontWeight:700}}>@{f.handle||"creator"}</p>
            </div>
          </div>
        </div>

        {/* Fields */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div className="g2">
            <div><label className="lbl">Platform</label>
              <select className="inp" value={f.platform} onChange={sf("platform")}>
                {Object.keys(platCfg).map(k=><option key={k} value={k}>{platCfg[k].label}</option>)}
              </select>
            </div>
            <div><label className="lbl">Handle</label><input className="inp" placeholder="@username" value={f.handle} onChange={sf("handle")}/></div>
          </div>
          <div><label className="lbl">Thumbnail URL <span style={{fontWeight:400,color:"var(--t3)"}}>(direct image link)</span></label><input className="inp" placeholder="auto-pulled or paste image URL" value={f.thumbnail} onChange={sf("thumbnail")}/></div>
          <div className="g2">
            <div><label className="lbl">Views</label><input className="inp" type="number" min="0" placeholder="0" value={f.views} onChange={sf("views")}/></div>
            <div><label className="lbl">Likes</label><input className="inp" type="number" min="0" placeholder="0" value={f.likes} onChange={sf("likes")}/></div>

          <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 50%)"}}/>
          <div style={{position:"absolute",top:10,left:10,background:"rgba(0,0,0,.7)",backdropFilter:"blur(3px)",borderRadius:6,padding:"3px 8px",display:"flex",alignItems:"center",gap:4}}>
            <P.I s={11} c="#fff"/><span style={{color:"#fff",fontSize:10,fontWeight:700}}>{P.label}</span>
          </div>
          {ref_&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.65)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><span className="spin"><Ref s={24} c="#fff"/></span><span style={{color:"#fff",fontSize:11,fontWeight:600}}>Refreshing…</span></div>}
          <div style={{position:"absolute",bottom:10,left:10,right:10}}>
            <p style={{color:"#fff",fontSize:13,fontWeight:700}}>{post.handle?"@"+post.handle:"@creator"}</p>

      </a>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginTop:7}}>

          <div key={l} style={{background:"var(--s2)",borderRadius:7,padding:"6px 8px",border:".5px solid var(--b1)"}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginBottom:1}}>{l}</div>
            <div style={{fontSize:13,fontWeight:700,color:c}}>{v||"—"}</div>
          </div>
        ))}
      </div>
      {post.saves&&<div style={{background:"var(--s2)",borderRadius:7,padding:"5px 8px",border:".5px solid var(--b1)",marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>💾 Saves</span><span style={{fontSize:12,fontWeight:700}}>{fmt(post.saves)}</span></div>}

      {!ro&&(
        <div style={{display:"flex",gap:4,marginTop:6}}>
          <button className="bo" onClick={onRefresh} disabled={ref_} style={{flex:1,justifyContent:"center",padding:"5px",fontSize:10,opacity:ref_?0.5:1}}><Ref s={10} spin={ref_}/>{ref_?"…":"Refresh"}</button>
          <button className="bo" onClick={onEdit} style={{padding:"5px 9px",fontSize:10}}><Pen s={10}/></button>
          <button className="bo" onClick={onDelete} style={{padding:"5px 9px",fontSize:11,color:"var(--t3)"}}>✕</button>

// ── DASHBOARD ──────────────────────────────────────────────
function Dashboard({id,ro,cfg}){
  const[camp,setCamp]=useState(null);
  const[posts,setPosts]=useState([]);
  const[spMeta,setSpMeta]=useState(null);
  const[cxStats,setCxStats]=useState(null);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[refreshing,setRefreshing]=useState(false);
  const[modal,setModal]=useState(null); // null|"add"|"edit-post"|"edit-camp"|"confirm-del"
  const[editTarget,setEditTarget]=useState(null);
  const[copied,setCopied]=useState(false);

  // ── Persist posts immediately every time they change ──
  const syncPosts=(next)=>{
    lw("posts_"+id,next);
    setPosts(next);
  };

  useEffect(()=>{
    const camps=ls("campaigns",[]);
    const c=camps.find(x=>x.id===id);
    setCamp(c||null);
    // Load posts from localStorage — strip stale _ref flags
    const saved=ls("posts_"+id,[]).map(p=>{const {_ref,...rest}=p;return rest});
    setPosts(saved);
    setLoading(false);
    if(c) syncAPIs(c);
  },[id]);

  const syncAPIs=async c=>{
    if(!c)return;setSyncing(true);
    if(c.spUrl&&cfg?.spId&&cfg?.spSec){
      try{const tok=await spTok(cfg.spId,cfg.spSec);const tid=spId(c.spUrl);if(tok&&tid){const m=await spTrack(tid,tok);if(m)setSpMeta(m)}}catch{}
    }
    if(cfg?.cxId&&cfg?.cxToken){
      try{
        const sid=spId(c.spUrl);
        let song=null;
        if(sid)song=await cxFindSong(cfg,sid,null);
        if(!song&&c.artist)song=await cxFindSong(cfg,null,c.artist+" "+c.name);
        if(song){const songId=song.id||song.song_id||song.chartex_id;const stats=await cxSongStats(cfg,songId);if(stats)setCxStats(stats);}
      }catch{}
    }
    setSyncing(false);
  };

  // Add post
  const addPost=data=>{
    const p={...data,id:uid(),addedAt:Date.now(),_at:Date.now()};
    syncPosts([...posts,p]);
    setModal(null);
  };

  // Edit post
  const saveEdit=data=>{
    const updated=posts.map(p=>p.id===editTarget.id?{...p,...data,_at:Date.now()}:p);
    syncPosts(updated);setModal(null);setEditTarget(null);
  };

  // Remove post
  const removePost=pid=>{
    syncPosts(posts.filter(p=>p.id!==pid));setModal(null);setEditTarget(null);
  };

  // Refresh single post
  const refreshOne=useCallback(async p=>{
    setPosts(prev=>prev.map(x=>x.id===p.id?{...x,_ref:true}:x));
    const d=await pullPost(p.postUrl,cfg);
    setPosts(prev=>{
      const next=prev.map(x=>x.id===p.id?{...x,...(d||{}),_ref:false,_at:Date.now()}:x);
      lw("posts_"+id,next.map(({_ref,...r})=>r));
      return next;
    });
  },[id,cfg]);

  // Refresh all
  const refreshAll=useCallback(async()=>{
    if(refreshing)return;setRefreshing(true);
    setPosts(prev=>prev.map(p=>({...p,_ref:true})));
    const next=await Promise.all(posts.map(async p=>{const d=await pullPost(p.postUrl,cfg);return d?{...p,...d,_ref:false,_at:Date.now()}:{...p,_ref:false}}));
    lw("posts_"+id,next.map(({_ref,...r})=>r));
    setPosts(next);setRefreshing(false);
  },[id,cfg,posts,refreshing]);

  // Edit campaign
  const saveCamp=data=>{
    const camps=ls("campaigns",[]);
    const updated=camps.map(c=>c.id===id?{...c,...data}:c);
    lw("campaigns",updated);
    setCamp(prev=>({...prev,...data}));
    setModal(null);
  };

  const T=posts.reduce((a,p)=>({v:a.v+(Number(p.views)||0),l:a.l+(Number(p.likes)||0),c:a.c+(Number(p.comments)||0),s:a.s+(Number(p.saves)||0)}),{v:0,l:0,c:0,s:0});
  const totalEr=T.v>0?((T.l+T.c)/T.v*100).toFixed(2)+"%":"—";

  // Sound count from Chartex
  const cxTotal=cxStats?.tiktok_total_video_count||cxStats?.total_video_count||cxStats?.total_creates||null;
  const cxIGR=cxStats?.instagram_reels_count||cxStats?.reels_count||null;

  const shareUrl=`${location.origin}${location.pathname}#/view/${id}`;
  const copyShare=()=>{try{navigator.clipboard.writeText(shareUrl)}catch{};setCopied(true);setTimeout(()=>setCopied(false),2200)};

  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",color:"var(--t2)"}}>Loading…</div>;
  if(!camp)return<div style={{textAlign:"center",padding:"4rem"}}><p style={{color:"var(--t2)",marginBottom:16}}>Campaign not found.</p><button className="bg" onClick={()=>location.hash="/"}>← All Campaigns</button></div>;

  return(
    <div className="page">

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem",gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {!ro&&<button className="bo" onClick={()=>location.hash="/"} style={{fontSize:12}}>← Back</button>}
          {spMeta?.art&&<img src={spMeta.art} alt="" style={{width:52,height:52,borderRadius:8,objectFit:"cover",border:".5px solid var(--b2)"}}/>}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-.3px"}}>{camp.name}</h1>
              {!ro&&<button className="bo" onClick={()=>setModal("edit-camp")} style={{padding:"4px 8px",fontSize:11}}><Pen s={10}/>Edit</button>}
              {ro&&<span className="tag" style={{background:"var(--ga)",color:GOLD,border:".5px solid var(--gb)"}}>PUBLIC VIEW</span>}
              {syncing&&<span style={{fontSize:11,color:"var(--t3)",display:"flex",alignItems:"center",gap:4}}><span className="spin"><Ref s={10}/></span>Syncing…</span>}
            </div>
            <p style={{color:"var(--t2)",fontSize:13,marginTop:2}}>
              {camp.artist}
              {spMeta?.name&&<> · <strong style={{color:"var(--t1)"}}>{spMeta.name}</strong></>}
              {spMeta?.pop!=null&&<span style={{marginLeft:8,color:GOLD,fontWeight:700,fontSize:12}}>★ {spMeta.pop}/100</span>}
            </p>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {camp.ttUrl&&<a href={camp.ttUrl} target="_blank" className="bo"><Tt s={12} c={TT}/>TikTok Sound</a>}
          {camp.igUrl&&<a href={camp.igUrl} target="_blank" className="bo"><Ig s={12} c={IG}/>IG Audio</a>}
          {camp.spUrl&&<a href={camp.spUrl} target="_blank" className="bo"><Sp s={12} c={SP}/>Spotify</a>}
          {!ro&&<button className="bo" onClick={()=>syncAPIs(camp)}><Ref s={12}/>Refresh Data</button>}
          <button className="bo" onClick={copyShare}>{copied?"✓ Copied":"🔗 Share"}</button>
        </div>
      </div>

      {/* SOUND PAGE CREATOR COUNT */}
      {(cxTotal!=null||cxIGR!=null||camp.ttUrl||camp.igUrl)&&(
        <div className="card pad" style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Sound Page — Creator Videos Using This Sound</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {(cxTotal!=null||camp.ttUrl)&&(
              <div style={{flex:1,minWidth:160,background:"var(--ta)",border:".5px solid rgba(105,201,208,0.25)",borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Tt s={14} c={TT}/><span style={{fontSize:10,fontWeight:700,color:TT,textTransform:"uppercase",letterSpacing:".05em"}}>TikTok Sound</span></div>
                <div style={{fontSize:32,fontWeight:800,color:TT,letterSpacing:"-.5px"}}>{cxTotal!=null?fmt(cxTotal):"—"}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>videos created using this sound</div>
              </div>
            )}
            {(cxIGR!=null||camp.igUrl)&&(
              <div style={{flex:1,minWidth:160,background:"var(--ia)",border:".5px solid rgba(225,48,108,0.25)",borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Ig s={14} c={IG}/><span style={{fontSize:10,fontWeight:700,color:IG,textTransform:"uppercase",letterSpacing:".05em"}}>Instagram Audio</span></div>
                <div style={{fontSize:32,fontWeight:800,color:IG,letterSpacing:"-.5px"}}>{cxIGR!=null?fmt(cxIGR):"—"}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>reels created using this audio</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* CREATOR POST PERFORMANCE */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>Creator Post Performance <span style={{color:TT,fontWeight:500,fontSize:11}}>· live from post links</span></div>
            <div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>{posts.length} post{posts.length!==1?"s":""} — paste any TikTok or Instagram link to track</div>
          </div>
          {!ro&&<button className="bg" onClick={refreshAll} disabled={refreshing}><Ref s={13} spin={refreshing}/>{refreshing?"Refreshing all…":"Refresh All"}</button>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(115px,1fr))",gap:8}}>
          {[["Total Views",fmt(T.v),true],["Total Likes",fmt(T.l)],["Total Comments",fmt(T.c)],["Total Saves",fmt(T.s)],["Avg Eng Rate",totalEr],["Posts Tracked",String(posts.length)]].map(([l,v,gold])=>(
            <div key={l} className="card pad" style={{borderTop:gold?`2px solid ${GOLD}`:undefined}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:5}}>{l}</div>
              <div style={{fontSize:20,fontWeight:800,color:gold?GOLD:"var(--t1)",letterSpacing:"-.5px"}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* CREATOR POSTS SCROLL */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>Creator Posts</div>
            <div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>Paste TikTok or Instagram link — handle & thumbnail auto-pull · all metrics editable · permanent</div>
          </div>
          {!ro&&<button className="bg" onClick={()=>setModal("add")}>+ Add Post</button>}
        </div>
        {posts.length===0?(
          <div style={{textAlign:"center",padding:"3rem 1rem",border:".5px dashed var(--b2)",borderRadius:10}}>
            <div style={{fontSize:32,marginBottom:12}}>🎬</div>
            <p style={{fontSize:14,fontWeight:600,marginBottom:6}}>No creator posts yet</p>
            <p style={{fontSize:12,color:"var(--t2)",marginBottom:16}}>Paste a TikTok or Instagram post URL — handle and thumbnail auto-populate. Add metrics manually or via Chartex API.</p>
            {!ro&&<button className="bg" onClick={()=>setModal("add")}>Add First Post</button>}
          </div>
        ):(
          <div className="sx" style={{paddingTop:2}}>
            {posts.map(p=>(
              <PostCard key={p.id} post={p}
                onRefresh={()=>refreshOne(p)}
                onEdit={()=>{setEditTarget(p);setModal("edit-post")}}
                onDelete={()=>{setEditTarget(p);setModal("confirm-del")}}
                ro={ro}
              />
            ))}
          </div>
        )}
      </div>

      {/* CHARTEX EMBED */}
      {camp.cxUrl&&<CxEmbed url={camp.cxUrl}/>}

      {/* SPOTIFY PANEL (if we have it) */}
      {spMeta&&(
        <div className="card pad" style={{marginBottom:14,display:"grid",gridTemplateColumns:"auto 1fr",gap:16,alignItems:"center"}}>
          <img src={spMeta.art} alt="" style={{width:80,height:80,borderRadius:8,objectFit:"cover",border:".5px solid var(--b1)"}}/>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><Sp s={16} c={SP}/><span style={{fontSize:14,fontWeight:700}}>{spMeta.name}</span><span style={{fontSize:12,color:"var(--t2)"}}>· {spMeta.artist}</span></div>
            {spMeta.pop!=null&&(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,height:4,background:"var(--s2)",borderRadius:2,overflow:"hidden",maxWidth:220}}><div style={{height:"100%",width:spMeta.pop+"%",background:SP,borderRadius:2}}/></div>
                <span style={{fontSize:12,fontWeight:700,color:SP}}>{spMeta.pop}/100 popularity</span>
                {camp.spUrl&&<a href={camp.spUrl} target="_blank" style={{background:SP,color:"#000",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>Open in Spotify</a>}
              </div>
            )}
          </div>
        </div>
      )}

      {/* SHARE BAR */}
      <div className="card pad" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div style={{minWidth:0}}><p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:3}}>Public share link</p><p style={{fontSize:11,color:GOLD,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shareUrl}</p></div>
        <button className="bg" onClick={copyShare} style={{flexShrink:0}}>{copied?"✓ Copied!":"Copy Link"}</button>
      </div>

      {/* ── MODALS ── */}
      {modal==="add"&&(
        <Modal title="Add Creator Post" onClose={()=>setModal(null)} mw={700}>
          <PostForm cfg={cfg} onSubmit={addPost} onClose={()=>setModal(null)} submitLabel="Add Post"/>
        </Modal>
      )}
      {modal==="edit-post"&&editTarget&&(
        <Modal title="Edit Creator Post" onClose={()=>{setModal(null);setEditTarget(null)}} mw={700}>
          <PostForm initial={editTarget} cfg={cfg} onSubmit={saveEdit} onClose={()=>{setModal(null);setEditTarget(null)}} submitLabel="Save Changes"/>
        </Modal>
      )}
      {modal==="edit-camp"&&(
        <Modal title="Edit Campaign" onClose={()=>setModal(null)} mw={600}>
          <CampaignForm initial={camp} onSubmit={saveCamp} onClose={()=>setModal(null)}/>
        </Modal>
      )}
      {modal==="confirm-del"&&editTarget&&(
        <Modal title="Remove Post?" onClose={()=>{setModal(null);setEditTarget(null)}} mw={400}>
          <p style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Remove @{editTarget.handle||"this creator"}'s post from the campaign? You can add it back anytime.</p>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="bo" onClick={()=>{setModal(null);setEditTarget(null)}}>Cancel</button>
            <button className="bg" style={{background:"var(--red)"}} onClick={()=>removePost(editTarget.id)}>Remove</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── CAMPAIGN LIST ──────────────────────────────────────────
function CampaignList({cfg,onSettings}){
  const[camps,setCamps]=useState(()=>ls("campaigns",[]));
  const[modal,setModal]=useState(null);
  const[del,setDel]=useState(null);
  const[edit,setEdit]=useState(null);

  const create=f=>{
    const c={...f,id:uid(),createdAt:Date.now()};
    const u=[...camps,c];setCamps(u);lw("campaigns",u);setModal(null);
    location.hash="/campaign/"+c.id;
  };
  const update=f=>{
    const u=camps.map(c=>c.id===edit.id?{...c,...f}:c);
    setCamps(u);lw("campaigns",u);setModal(null);setEdit(null);
  };
  const remove=cid=>{
    const u=camps.filter(c=>c.id!==cid);setCamps(u);lw("campaigns",u);setDel(null);
  };

  const hasKeys=cfg?.spId||cfg?.cxId;

  return(
    <div className="page">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"2rem",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:28,fontWeight:800,letterSpacing:"-.5px"}}><span style={{color:GOLD}}>✦</span> Creator Campaigns</h1>
          <p style={{color:"var(--t2)",marginTop:4,fontSize:13}}>Live TikTok · Instagram · Spotify · Chartex embedded</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="bo" onClick={onSettings} style={{borderColor:hasKeys?"rgba(29,185,84,.4)":"var(--b2)",color:hasKeys?SP:"var(--t2)"}}>⚙ {hasKeys?"APIs Connected":"Connect APIs"}</button>
          <button className="bg" onClick={()=>setModal("create")}>+ New Campaign</button>
        </div>
      </div>

      {!hasKeys&&(
        <div style={{background:"var(--s1)",border:".5px solid var(--gb)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          <span style={{fontSize:24}}>🔑</span>
          <div style={{flex:1}}><p style={{fontWeight:700,fontSize:13,color:GOLD}}>Connect APIs for live data</p><p style={{fontSize:12,color:"var(--t2)",marginTop:2}}>Spotify → album art & track info · Chartex → TikTok creates count, IG reels count, creator post video metrics</p></div>
          <button className="bg" onClick={onSettings} style={{flexShrink:0}}>Connect APIs →</button>
        </div>
      )}

      {camps.length===0?(
        <div className="card" style={{padding:"5rem 2rem",textAlign:"center"}}>
          <div style={{fontSize:44,color:GOLD,marginBottom:18}}>✦</div>
          <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>No campaigns yet</h2>
          <p style={{fontSize:13,color:"var(--t2)",maxWidth:440,margin:"0 auto 20px",lineHeight:1.7}}>Create a campaign with your TikTok sound, IG audio, Spotify, and Chartex links. Then track creator posts with live metrics — handles and thumbnails pull automatically from any post URL.</p>
          <button className="bg" onClick={()=>setModal("create")}>Create Campaign</button>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
          {camps.map(c=>(
            <div key={c.id} className="card pad" style={{cursor:"pointer",transition:"border-color .15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.35)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--b1)"}
              onClick={()=>location.hash="/campaign/"+c.id}>
              <div style={{display:"flex",gap:12,marginBottom:12}}>
                <div style={{width:42,height:42,borderRadius:8,background:"var(--ga)",border:".5px solid var(--gb)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:GOLD,fontSize:22}}>✦</span></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</p>
                  <p style={{fontSize:12,color:"var(--t2)",marginTop:2}}>{c.artist}</p>
                </div>
              </div>
              {c.desc&&<p style={{fontSize:12,color:"var(--t2)",lineHeight:1.5,marginBottom:10}}>{c.desc}</p>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {c.ttUrl&&<span className="tag" style={{background:"var(--ta)",color:TT}}><Tt s={9} c={TT}/>TikTok</span>}
                {c.igUrl&&<span className="tag" style={{background:"var(--ia)",color:IG}}><Ig s={9} c={IG}/>Instagram</span>}
                {c.spUrl&&<span className="tag" style={{background:"var(--sa)",color:SP}}><Sp s={9} c={SP}/>Spotify</span>}
                {c.cxUrl&&<span className="tag" style={{background:"var(--ta)",color:TT}}>Chartex Live</span>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:12,borderTop:".5px solid var(--b1)"}}>
                <span style={{fontSize:11,color:"var(--t3)"}}>{new Date(c.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                <div style={{display:"flex",gap:6}}>
                  <button className="bo" style={{padding:"3px 9px",fontSize:11}} onClick={e=>{e.stopPropagation();setEdit(c);setModal("edit")}}><Pen s={10}/>Edit</button>
                  <button className="bo" style={{padding:"3px 9px",fontSize:11,color:"var(--t3)"}} onClick={e=>{e.stopPropagation();setDel(c.id)}}>Delete</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {modal==="create"&&<Modal title="New Campaign" onClose={()=>setModal(null)} mw={600}><CampaignForm onSubmit={create} onClose={()=>setModal(null)}/></Modal>}
      {modal==="edit"&&edit&&<Modal title="Edit Campaign" onClose={()=>{setModal(null);setEdit(null)}} mw={600}><CampaignForm initial={edit} onSubmit={update} onClose={()=>{setModal(null);setEdit(null)}}/></Modal>}
      {del&&<Modal title="Delete Campaign?" onClose={()=>setDel(null)} mw={400}><p style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Delete this campaign and all its creator posts? This can't be undone.</p><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button className="bo" onClick={()=>setDel(null)}>Cancel</button><button className="bg" style={{background:"var(--red)"}} onClick={()=>remove(del)}>Delete</button></div></Modal>}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────
function App(){
  const[hash,setHash]=useState(location.hash||"");
  const[cfg,setCfg]=useState(()=>ls("apiCfg",{}));
  const[settings,setSettings]=useState(false);

  useEffect(()=>{
    const h=()=>setHash(location.hash||"");
    window.addEventListener("hashchange",h);
    return()=>window.removeEventListener("hashchange",h);
  },[]);

  const saveCfg=f=>{setCfg(f);lw("apiCfg",f);setSettings(false)};
  const h=(hash||"").replace("#","");

  let page;
  if(h.startsWith("/campaign/")){const id=h.split("/")[2];page=<Dashboard id={id} ro={false} cfg={cfg}/>}
  else if(h.startsWith("/view/")){const id=h.split("/")[2];page=<Dashboard id={id} ro={true} cfg={cfg}/>}
  else page=<CampaignList cfg={cfg} onSettings={()=>setSettings(true)}/>;

  return(<>{page}{settings&&<SettingsModal cur={cfg} onSave={saveCfg} onClose={()=>setSettings(false)}/>}</>);
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}catch(e){
  document.getElementById("root").innerHTML=`<div style="color:#e74c3c;padding:2rem;font-family:sans-serif;background:#111"><h2 style="margin-bottom:8px">Error loading dashboard</h2><pre style="font-size:12px;opacity:.7">${e.message}\n${e.stack||""}</pre></div>`;
}
</script>
</body>
