<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Creator Campaign Dashboard — Wirehouse Media</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090909;--s1:#131313;--s2:#1d1d1d;--s3:#252525;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.13);--b3:rgba(255,255,255,0.22);
  --t1:#f0f0f0;--t2:rgba(240,240,240,0.52);--t3:rgba(240,240,240,0.26);
  --gold:#C9A84C;--ga:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.32);
  --tt:#69C9D0;--ta:rgba(105,201,208,0.11);
  --ig:#E1306C;--ia:rgba(225,48,108,0.11);
  --sp:#1DB954;--red:#e53e3e;
  --draft:#888;--review:#f0c040;--approved:#4caf50;--live:#69C9D0;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page{padding:1.75rem 2rem;max-width:1300px;margin:0 auto;animation:up .2s ease}
.card{background:var(--s1);border:.5px solid var(--b1);border-radius:14px}
.pad{padding:1.25rem}
.inp{width:100%;padding:9px 12px;background:var(--s2);border:.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:13px;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6}
select.inp option{background:var(--s2)}
.bg{background:var(--gold);color:#000;font-weight:700;font-size:13px;padding:8px 16px;border-radius:10px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s}
.bg:hover{opacity:.88}.bg:disabled{opacity:.45;cursor:not-allowed}
.bo{background:var(--s2);color:var(--t2);border:.5px solid var(--b2);font-size:12px;padding:6px 13px;border-radius:10px;display:inline-flex;align-items:center;gap:5px;transition:border-color .15s}
.bo:hover{border-color:var(--b3)}
.lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px 40px;z-index:999;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:#181818;border:.5px solid var(--b2);border-radius:16px;width:100%;padding:1.75rem;box-shadow:0 40px 100px rgba(0,0,0,.9);animation:up .15s ease}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.sx{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.hr{height:.5px;background:var(--b1);margin:14px 0}
.spin{animation:spin .7s linear infinite;display:inline-block;line-height:1}

/* Status badges */
.sb-draft{background:rgba(136,136,136,.15);color:#888;border:.5px solid rgba(136,136,136,.3)}
.sb-review{background:rgba(240,192,64,.12);color:#f0c040;border:.5px solid rgba(240,192,64,.3)}
.sb-approved{background:rgba(76,175,80,.12);color:#4caf50;border:.5px solid rgba(76,175,80,.3)}
.sb-live{background:rgba(105,201,208,.12);color:#69C9D0;border:.5px solid rgba(105,201,208,.3)}

/* Comment thread */
.comment{background:var(--s2);border:.5px solid var(--b1);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.comment-author{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:3px}
.comment-text{font-size:12px;color:var(--t2);line-height:1.6}
.comment-time{font-size:10px;color:var(--t3);margin-top:3px}

/* Post card status badge — top right absolute */
.post-status-badge{position:absolute;top:10px;right:10px;z-index:2;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;letter-spacing:.04em}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;color:rgba(240,240,240,0.26);font-size:13px">
    <div class="spin" style="width:22px;height:22px;border:2px solid rgba(255,255,255,0.08);border-top-color:#C9A84C;border-radius:50%"></div>
    Loading…
  </div>
</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const GOLD="#C9A84C",TT="#69C9D0",IG="#E1306C",SP="#1DB954";

// ── UTILS
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=n=>{n=Number(n)||0;if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return Math.round(n).toLocaleString()};
const fmtUSD=n=>"$"+(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";
const ttVid=u=>(u||"").match(/video\/(\d{10,25})/)?.[1]||null;
const ttMid=u=>{const m=(u||"").match(/music\/[^?/]*?(\d{10,25})/)||(u||"").match(/musicId=(\d+)/);return m?.[1]||null};
const ttUsr=u=>(u||"").match(/@([^/?&\s]+)/)?.[1]||null;
const igCd=u=>(u||"").match(/\/(p|reel|reels|tv)\/([A-Za-z0-9_-]+)/)?.[2]||null;
const igAudioId=u=>(u||"").match(/reels\/audio\/(\d+)/)?.[1]||null;
const spId=u=>(u||"").match(/track\/([A-Za-z0-9]+)/)?.[1]||null;
const getPlatform=u=>{if(!u)return null;if(u.includes("tiktok.com"))return"tiktok";if(u.includes("instagram.com"))return"instagram";return null};
const proxyThumb=url=>{
  if(!url)return null;
  if(url.startsWith("/api/proxy-image"))return url;
  if(url.includes("fbcdn")||url.includes("cdninstagram")||url.includes("instagram.f"))
    return`/api/proxy-image?url=${encodeURIComponent(url)}`;
  return url;
};

// Status config
const STATUS_ORDER=["draft","review","approved","live"];
const STATUS_LABEL={draft:"Draft",review:"In Review",approved:"Approved",live:"🔴 Live"};
const STATUS_CLASS={draft:"sb-draft",review:"sb-review",approved:"sb-approved",live:"sb-live"};
const STATUS_COLOR={draft:"#888",review:"#f0c040",approved:"#4caf50",live:"#69C9D0"};

// ── JSONBIN
const JBIN="https://api.jsonbin.io/v3";
async function jbRead(key,bin){
  if(!key||!bin)return null;
  try{
    const r=await fetch(`${JBIN}/b/${bin}/latest`,{headers:{"X-Master-Key":key,"X-Bin-Meta":false}});
    if(!r.ok)return null;
    const d=await r.json();
    return d?.record||d||null;
  }catch(e){console.error("jbRead:",e);return null}
}
async function jbWrite(key,bin,data){
  if(!key||!bin)return false;
  try{
    const r=await fetch(`${JBIN}/b/${bin}`,{method:"PUT",headers:{"X-Master-Key":key,"Content-Type":"application/json"},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){console.error("jbWrite:",e);return false}
}

// ── API CALLS
async function fetchTTPost(vid,originalUrl){
  if(!vid)return null;
  try{
    const params=new URLSearchParams({videoId:vid});
    if(originalUrl)params.set("videoUrl",encodeURIComponent(originalUrl));
    const r=await fetch(`/api/tt-post?${params.toString()}`);
    if(!r.ok)return null;
    const d=await r.json();
    const item=d?.data||d?.itemInfo?.itemStruct||d?.item||(Array.isArray(d?.items)?d.items[0]:null)||d;
    const st=item?.statistics||item?.stats||{};
    const auth=item?.author||item?.authorMeta||{};
    const vid2=item?.video||{};
    const views=Number(st.play_count||st.playCount||0)||null;
    const likes=Number(st.digg_count||st.diggCount||0)||null;
    const comments=Number(st.comment_count||st.commentCount||0)||null;
    const saves=Number(st.collect_count||st.collectCount||0)||null;
    const thumbnail=vid2.cover||vid2.dynamicCover||null;
    const handle=(auth.unique_id||auth.uniqueId||auth.nickname||"").replace(/^@/,"")||null;
    if(!views&&!likes&&!handle&&!thumbnail)return null;
    return{views,likes,comments,saves,thumbnail,handle};
  }catch(e){console.error("fetchTTPost:",e);return null}
}
async function fetchTTMusic(mid){
  if(!mid)return null;
  try{
    const r=await fetch(`/api/tt-music?musicId=${mid}`);
    if(!r.ok)return null;
    const d=await r.json();
    const st=d?.musicInfo?.stats||d?.data?.musicInfo?.stats||d?.stats||{};
    const music=d?.musicInfo?.music||d?.data?.musicInfo?.music||d?.music||d?.data||{};
    const count=st.videoCount||st.video_count||music.videoCount||music.video_count||d?.videoCount||null;
    return{videoCount:count};
  }catch(e){return null}
}
async function fetchIGPost(code,originalUrl){
  if(!originalUrl&&!code)return null;
  try{
    const param=originalUrl||`https://www.instagram.com/p/${code}/`;
    const r=await fetch(`/api/ig-post?postUrl=${encodeURIComponent(param)}`);
    if(!r.ok)return null;
    const d=await r.json();
    if(!d||d.status===false)return null;
    const views=Number(d.video_view_count||d.view_count||0)||null;
    const likes=Number(d.edge_media_preview_like?.count||d.edge_liked_by?.count||d.likes||0)||null;
    const comments=Number(d.edge_media_to_parent_comment?.count||d.edge_media_preview_comment?.count||0)||null;
    const rawThumb=d.thumbnail_src||d.display_url||null;
    const thumbnail=rawThumb?`/api/proxy-image?url=${encodeURIComponent(rawThumb)}`:null;
    const handle=(d.owner?.username||d.username||"").replace(/^@/,"")||null;
    if(!likes&&!views&&!handle&&!thumbnail)return null;
    return{views,likes,comments,saves:null,thumbnail,handle};
  }catch(e){return null}
}
async function pullPost(url){
  const p=getPlatform(url);
  if(!p)return null;
  const base={platform:p,postUrl:url,handle:"",thumbnail:null,views:null,likes:null,comments:null,saves:null};
  if(p==="tiktok"){const d=await fetchTTPost(ttVid(url),url);return d?{...base,...d,platform:"tiktok"}:{...base,handle:ttUsr(url)||""}}
  if(p==="instagram"){const d=await fetchIGPost(igCd(url),url);return d?{...base,...d,platform:"instagram"}:base}
  return base;
}
function mergePostData(existing,fresh){
  if(!fresh)return existing;
  const keep=(o,n)=>{const nv=Number(n),ov=Number(o);if(nv>0&&ov>0)return nv>ov?n:o;if(nv>0)return n;return o};
  return{...existing,handle:existing.handle||fresh.handle,thumbnail:fresh.thumbnail||existing.thumbnail,
    views:keep(existing.views,fresh.views),likes:keep(existing.likes,fresh.likes),
    comments:keep(existing.comments,fresh.comments),saves:keep(existing.saves,fresh.saves),budget:existing.budget};
}

// ── SPOTIFY + CHARTEX
async function spToken(id,sec){try{const r=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:`grant_type=client_credentials&client_id=${id}&client_secret=${sec}`});return r.ok?(await r.json()).access_token:null}catch{return null}}
async function spTrack(tid,tok){try{const r=await fetch(`https://api.spotify.com/v1/tracks/${tid}`,{headers:{Authorization:`Bearer ${tok}`}});if(!r.ok)return null;const t=await r.json();return{name:t.name,artist:t.artists?.map(a=>a.name).join(", "),art:t.album?.images?.[0]?.url,pop:t.popularity}}catch{return null}}
const CX="https://api.chartex.com/external/v1";
async function cxGet(path,cfg){if(!cfg?.cxId||!cfg?.cxToken)return null;try{const r=await fetch(CX+path,{headers:{"X-APP-ID":cfg.cxId,"X-APP-TOKEN":cfg.cxToken}});return r.ok?(await r.json()):null}catch{return null}}
async function cxFindSong(cfg,sid,name){const p=sid?`/songs/?spotify_id=${sid}&limit=3`:`/songs/?search=${encodeURIComponent(name||"")}&limit=5`;const d=await cxGet(p,cfg);const a=d?.data?.items||d?.items||(Array.isArray(d)?d:[]);return a[0]||null}
async function cxSongStats(cfg,id){const d=await cxGet(`/songs/${id}/`,cfg);return d?.data||d||null}

// ── ICONS
const Tt=({s=16,c=TT})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.26 8.26 0 004.84 1.56V6.8a4.85 4.85 0 01-1.07-.11z"/></svg>;
const Ig=({s=16,c=IG})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>;
const Sv=({s=16,c=SP})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>;
const Rf=({s=13,c="currentColor",spin})=><svg className={spin?"spin":""} width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>;
const Pn=({s=12})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

// ── MODAL
function Modal({title,onClose,children,mw=500}){
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:mw}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:17,fontWeight:700}}>{title}</h2>
          <button onClick={onClose} style={{color:"var(--t3)",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── POST FORM (add/edit post — now includes status + deliverable date)
function PostForm({initial,onSubmit,onClose,cfg,label}){
  const[url,setUrl]=useState(initial?.postUrl||"");
  const[fetching,setFetching]=useState(false);
  const[f,setF]=useState({
    handle:initial?.handle||"",
    views:initial?.views||"",
    likes:initial?.likes||"",
    comments:initial?.comments||"",
    saves:initial?.saves||"",
    budget:initial?.budget||"",
    platform:initial?.platform||"tiktok",
    thumbnail:initial?.thumbnail||"",
    status:initial?.status||"draft",
    deliverableDate:initial?.deliverableDate||"",
    notes:initial?.notes||"",
  });
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const fetchMetrics=async()=>{
    if(!url.trim())return;
    setFetching(true);
    const d=await pullPost(url.trim());
    if(d){setF(p=>({...p,...d,views:d.views||p.views,likes:d.likes||p.likes,comments:d.comments||p.comments,saves:d.saves||p.saves,handle:d.handle||p.handle,thumbnail:d.thumbnail||p.thumbnail,platform:d.platform||p.platform}));}
    setFetching(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* URL + Fetch */}
      <div>
        <label className="lbl">Post URL (TikTok or Instagram)</label>
        <div style={{display:"flex",gap:8}}>
          <input className="inp" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://www.tiktok.com/@handle/video/…" style={{flex:1}}/>
          <button className="bg" onClick={fetchMetrics} disabled={fetching||!url.trim()} style={{flexShrink:0}}>
            <Rf s={12} spin={fetching}/>{fetching?"Fetching…":"Pull Metrics"}
          </button>
        </div>
        {url&&<a href={url} target="_blank" style={{fontSize:11,color:TT,marginTop:4,display:"block"}}>Open post ↗</a>}
      </div>

      {/* Status + Deliverable Date */}
      <div className="g2">
        <div>
          <label className="lbl">Post Status</label>
          <select className="inp" value={f.status} onChange={s("status")}>
            <option value="draft">Draft</option>
            <option value="review">In Review</option>
            <option value="approved">Approved</option>
            <option value="live">🔴 Live</option>
          </select>
        </div>
        <div>
          <label className="lbl">Deliverable Date</label>
          <input className="inp" type="date" value={f.deliverableDate} onChange={s("deliverableDate")}/>
        </div>
      </div>

      {/* Handle + Platform */}
      <div className="g2">
        <div>
          <label className="lbl">Handle</label>
          <input className="inp" value={f.handle} onChange={s("handle")} placeholder="@creator"/>
        </div>
        <div>
          <label className="lbl">Platform</label>
          <select className="inp" value={f.platform} onChange={s("platform")}>
            <option value="tiktok">TikTok</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
          </select>
        </div>
      </div>

      {/* Metrics */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[["Views","views"],["Likes","likes"],["Comments","comments"],["Saves","saves"]].map(([l,k])=>(
          <div key={k}>
            <label className="lbl">{l}</label>
            <input className="inp" value={f[k]} onChange={s(k)} placeholder="0" type="number"/>
          </div>
        ))}
      </div>

      {/* Budget */}
      <div>
        <label className="lbl">Creator Rate / Post Cost (USD)</label>
        <input className="inp" value={f.budget} onChange={s("budget")} placeholder="0" type="number"/>
      </div>

      {/* Notes */}
      <div>
        <label className="lbl">Notes / Brief</label>
        <textarea className="inp" value={f.notes} onChange={s("notes")} placeholder="Brief details, content direction, approval notes…"/>

      {(f.thumbnail||initial?.thumbnail)&&(
        <div>
          <label className="lbl">Thumbnail</label>

}

// ── POST CARD (with status badge, deliverable date, comments)
function PostCard({post,onRefresh,onEdit,onDelete,onStatusChange,onAddComment,ro}){
  const P=post.platform==="instagram"?{I:Ig,c:IG,label:"Instagram"}:{I:Tt,c:TT,label:"TikTok"};
  const thumb=proxyThumb(post.thumbnail);
  const[showComments,setShowComments]=useState(false);
  const[newComment,setNewComment]=useState("");
  const statusClass=STATUS_CLASS[post.status||"draft"];
  const statusLabel=STATUS_LABEL[post.status||"draft"];

  const submitComment=()=>{
    if(!newComment.trim())return;
    onAddComment(post.id,{id:uid(),text:newComment.trim(),author:"Wirehouse Media",ts:new Date().toISOString()});
    setNewComment("");
  };

  const nextStatus=()=>{
    const i=STATUS_ORDER.indexOf(post.status||"draft");
    const next=STATUS_ORDER[Math.min(i+1,STATUS_ORDER.length-1)];
    onStatusChange(post.id,next);
  };
  const prevStatus=()=>{
    const i=STATUS_ORDER.indexOf(post.status||"draft");
    const prev=STATUS_ORDER[Math.max(i-1,0)];
    onStatusChange(post.id,prev);
  };

  return(
    <div style={{minWidth:230,maxWidth:270,background:"var(--s1)",border:".5px solid var(--b1)",borderRadius:14,overflow:"hidden",flexShrink:0,position:"relative",display:"flex",flexDirection:"column"}}>
      {/* STATUS BADGE — top right */}
      <div className={`post-status-badge tag ${statusClass}`}>{statusLabel}</div>

      {/* Thumbnail */}
      {thumb?(
        <a href={post.postUrl} target="_blank" style={{display:"block",height:160,overflow:"hidden",background:"#000",flexShrink:0}}>
          <img src={thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:.92}} onError={e=>e.target.style.display="none"}/>
        </a>
      ):(
        <a href={post.postUrl} target="_blank" style={{display:"flex",alignItems:"center",justifyContent:"center",height:160,background:"var(--s2)",flexShrink:0}}>
          <P.I s={36} c={P.c}/>
        </a>
      )}

      <div style={{padding:"12px 14px",flex:1,display:"flex",flexDirection:"column",gap:10}}>
        {/* Platform + Handle */}
        <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <P.I s={14} c={P.c}/>
            <a href={`https://www.${post.platform}.com/@${post.handle||""}`} target="_blank" style={{fontSize:13,fontWeight:700,color:P.c}}>
              {post.handle?"@"+post.handle:P.label}
            </a>
          </div>
          {post._ref&&<span className="spin" style={{fontSize:11,color:"var(--t3)"}}><Rf s={10}/></span>}
        </div>

        {/* Deliverable date */}
        {post.deliverableDate&&(
          <div style={{fontSize:10,color:"var(--t3)",display:"flex",alignItems:"center",gap:4}}>
            <span>📅</span>
            <span>Due: {fmtDate(post.deliverableDate)}</span>
          </div>
        )}

        {/* Metrics */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[
            ["Views",post.views,"👁"],
            ["Likes",post.likes,"♥"],
            ["Comments",post.comments,"💬"],
            ...(post.saves!=null?[["Saves",post.saves,"🔖"]]:[]),
            ...(post.budget>0?[["Rate",`$${Number(post.budget).toLocaleString()}`,""]]:[]),
          ].map(([l,v,icon])=>(
            <div key={l} style={{background:"var(--s2)",borderRadius:8,padding:"7px 10px"}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--t3)",marginBottom:3}}>{icon} {l}</div>
              <div style={{fontSize:16,fontWeight:800,color:v!=null&&v!=="—"?GOLD:"var(--t3)",letterSpacing:"-.3px"}}>{v!=null?fmt(Number(v)):"—"}</div>
            </div>
          ))}
        </div>

        {/* Notes */}
        {post.notes&&<div style={{fontSize:11,color:"var(--t2)",lineHeight:1.5,background:"var(--s2)",borderRadius:8,padding:"7px 10px"}}>{post.notes}</div>}

        {/* Status stepper */}
        {!ro&&(
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <button onClick={prevStatus} className="bo" style={{padding:"3px 8px",fontSize:11,opacity:(post.status||"draft")==="draft"?0.3:1}}>←</button>
            <div style={{flex:1,textAlign:"center",fontSize:10,fontWeight:700,color:STATUS_COLOR[post.status||"draft"]}}>
              {statusLabel}
            </div>
            <button onClick={nextStatus} className="bo" style={{padding:"3px 8px",fontSize:11,opacity:(post.status||"draft")==="live"?0.3:1}}>→</button>
          </div>
        )}

        {/* Actions */}
        {!ro&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button onClick={onRefresh} className="bo" style={{flex:1,justifyContent:"center",padding:"5px 8px",fontSize:11}}><Rf s={10}/>Refresh</button>
            <button onClick={onEdit} className="bo" style={{flex:1,justifyContent:"center",padding:"5px 8px",fontSize:11}}><Pn s={10}/>Edit</button>
            <button onClick={onDelete} className="bo" style={{flex:"0 0 auto",padding:"5px 8px",fontSize:11,color:"var(--t3)"}}>✕</button>
          </div>
        )}

        {/* Comments toggle */}
        <div style={{borderTop:".5px solid var(--b1)",paddingTop:8}}>
          <button onClick={()=>setShowComments(p=>!p)} style={{fontSize:11,color:"var(--t2)",display:"flex",alignItems:"center",gap:5,width:"100%"}}>
            <span>💬</span>
            <span>{(post.threadComments||[]).length} comment{(post.threadComments||[]).length!==1?"s":""}</span>
            <span style={{marginLeft:"auto",fontSize:10,opacity:.6}}>{showComments?"▲":"▼"}</span>
          </button>

          {showComments&&(
            <div style={{marginTop:10}}>
              {/* Existing comments */}
              {(post.threadComments||[]).map(c=>(
                <div key={c.id} className="comment">
                  <div className="comment-author">{c.author}</div>
                  <div className="comment-text">{c.text}</div>
                  <div className="comment-time">{fmtDate(c.ts)}</div>
                </div>
              ))}
              {/* Add comment */}
              <div style={{display:"flex",gap:6,marginTop:6}}>
                <input className="inp" value={newComment} onChange={e=>setNewComment(e.target.value)}
                  placeholder="Add comment or feedback…" style={{flex:1,fontSize:12,padding:"6px 10px"}}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submitComment();}}}/>
                <button onClick={submitComment} className="bg" style={{padding:"6px 12px",fontSize:11,flexShrink:0}}>Post</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD
function Dashboard({id,ro,cfg,db_,onDbChange}){
  const camps=db_?.campaigns||[];
  const camp=camps.find(c=>c.id===id)||null;
  const posts=((db_?.posts)||{})[id]||[];
  const[spMeta,setSpMeta]=useState(null);
  const[soundStats,setSoundStats]=useState({tt:null,ig:null});
  const[syncing,setSyncing]=useState(false);
  const[refAll,setRefAll]=useState(false);
  const[modal,setModal]=useState(null);
  const[editTgt,setEditTgt]=useState(null);
  const[copied,setCopied]=useState(false);

  const setPosts=useCallback(next=>{
    const clean=next.map(({_ref,...r})=>r);
    onDbChange({...db_,posts:{...(db_?.posts||{}),[id]:clean}});
  },[id,db_,onDbChange]);

  useEffect(()=>{if(camp)syncAll(camp)},[id]);

  const syncAll=async c=>{
    if(!c)return;
    setSyncing(true);
    if(c.spUrl&&cfg?.spId&&cfg?.spSec){
      try{const tok=await spToken(cfg.spId,cfg.spSec);const tid=spId(c.spUrl);if(tok&&tid){const m=await spTrack(tid,tok);if(m)setSpMeta(m)}}catch{}
    }
    const ns={tt:null,ig:null};
    const igAid=igAudioId(c.igUrl);
    if(c.ttUrl&&cfg?.hasRapid){
      const mid=ttMid(c.ttUrl);
      if(mid){const m=await fetchTTMusic(mid);if(m?.videoCount!=null)ns.tt=m.videoCount;}
    }
    if(igAid&&cfg?.hasRapid){
      try{
        const r=await fetch(`/api/ig-music?audioId=${igAid}`);
        if(r.ok){const d=await r.json();const count=d?.reels_count||d?.clips_count||d?.media_count||d?.count||null;if(count!=null)ns.ig=count;}
      }catch{}
    }
    if(cfg?.cxId&&cfg?.cxToken){
      try{
        const sid=spId(c.spUrl);
        let song=sid?await cxFindSong(cfg,sid,null):null;
        if(!song&&c.artist)song=await cxFindSong(cfg,null,c.artist+" "+c.name);
        if(song){
          const st=await cxSongStats(cfg,song.id||song.song_id||song.chartex_id);
          if(st){if(ns.tt==null)ns.tt=st.tiktok_total_video_count||null;if(ns.ig==null)ns.ig=st.instagram_reels_count||null;}
        }
      }catch{}
    }
    setSoundStats(ns);
    setSyncing(false);
  };

  const addPost=data=>{setPosts([...posts,{...data,id:uid(),addedAt:Date.now(),_at:Date.now(),threadComments:[],status:"draft"}]);setModal(null)};
  const saveEdit=data=>{setPosts(posts.map(p=>p.id===editTgt.id?{...p,...data,_at:Date.now()}:p));setModal(null);setEditTgt(null)};
  const removePost=pid=>{setPosts(posts.filter(p=>p.id!==pid));setModal(null);setEditTgt(null)};

  const refreshOne=useCallback(async p=>{
    if(!cfg?.hasRapid)return;
    onDbChange({...db_,posts:{...(db_?.posts||{}),[id]:posts.map(x=>x.id===p.id?{...x,_ref:true}:x)}});
    const d=await pullPost(p.postUrl);
    const next=posts.map(x=>x.id===p.id?{...mergePostData(x,d),_ref:false,_at:Date.now()}:x);
    setPosts(next);
  },[id,posts,db_,cfg,onDbChange]);

  const refreshAll=useCallback(async()=>{
    if(refAll||!cfg?.hasRapid)return;
    setRefAll(true);
    onDbChange({...db_,posts:{...(db_?.posts||{}),[id]:posts.map(p=>({...p,_ref:true}))}});
    const next=await Promise.all(posts.map(async p=>{const d=await pullPost(p.postUrl);return{...mergePostData(p,d),_ref:false,_at:Date.now()}}));
    setPosts(next);
    setRefAll(false);
  },[id,posts,db_,cfg,onDbChange,refAll]);

  // Update post status
  const changeStatus=(pid,newStatus)=>{
    setPosts(posts.map(p=>p.id===pid?{...p,status:newStatus,_at:Date.now()}:p));
  };

  // Add comment to a post
  const addComment=(pid,comment)=>{
    setPosts(posts.map(p=>p.id===pid?{...p,threadComments:[...(p.threadComments||[]),comment]}:p));
  };

  const saveCamp=data=>{onDbChange({...db_,campaigns:camps.map(c=>c.id===id?{...c,...data}:c)});setModal(null)};

  // Totals
  const T=posts.reduce((a,p)=>({
    v:  a.v +(Number(p.views)   ||0),
    l:  a.l +(Number(p.likes)   ||0),
    c_: a.c_+(Number(p.comments)||0),
    s:  a.s +(Number(p.saves)   ||0),
    b:  a.b +(Number(p.budget)  ||0),
  }),{v:0,l:0,c_:0,s:0,b:0});
  const totalEr=T.v>0?((T.l+T.c_)/T.v*100).toFixed(2)+"%":"—";
  const emv=T.v*0.008;
  const roi=T.b>0?((emv-T.b)/T.b*100):0;
  const cpv=T.v>0?(T.b/T.v):0;
  const cpe=(T.l+T.c_+T.s)>0?(T.b/(T.l+T.c_+T.s)):0;

  // Status summary
  const statusCounts=posts.reduce((a,p)=>{a[p.status||"draft"]=(a[p.status||"draft"]||0)+1;return a},{});

  const shareUrl=`${location.origin}${location.pathname}#/view/${id}`;
  const copyShare=()=>{try{navigator.clipboard.writeText(shareUrl)}catch{};setCopied(true);setTimeout(()=>setCopied(false),2200)};

  if(!camp){
    return(
      <div style={{textAlign:"center",padding:"4rem"}}>
        <p style={{color:"var(--t2)",marginBottom:8,fontSize:15,fontWeight:600}}>Campaign not found</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button className="bo" onClick={()=>location.reload()}>Refresh</button>
          <button className="bg" onClick={()=>location.hash="/"}>← All Campaigns</button>
        </div>
      </div>
    );
  }

  return(
    <div className="page">
      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem",gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {!ro&&<button className="bo" onClick={()=>location.hash="/"} style={{fontSize:12}}>← Back</button>}
          {spMeta?.art&&<img src={spMeta.art} alt="" style={{width:52,height:52,borderRadius:8,objectFit:"cover",border:".5px solid var(--b2)"}}/>}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-.3px"}}>{camp.name}</h1>
              {!ro&&<button className="bo" onClick={()=>setModal("edit-camp")} style={{padding:"4px 8px",fontSize:11}}><Pn s={10}/>Edit</button>}
              {ro&&<span className="tag" style={{background:"var(--ga)",color:GOLD,border:".5px solid var(--gb)"}}>PUBLIC VIEW</span>}
              {syncing&&<span style={{fontSize:11,color:"var(--t3)",display:"flex",alignItems:"center",gap:4}}><span className="spin"><Rf s={10}/></span>Syncing…</span>}
            </div>
            <p style={{color:"var(--t2)",fontSize:13,marginTop:2}}>
              {camp.artist}
              {spMeta?.name&&<> · <strong style={{color:"var(--t1)"}}>{spMeta.name}</strong></>}
              {spMeta?.pop!=null&&<span style={{marginLeft:8,color:GOLD,fontWeight:700,fontSize:12}}>★ {spMeta.pop}/100</span>}
            </p>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {camp.ttUrl&&<a href={camp.ttUrl} target="_blank" className="bo"><Tt s={12} c={TT}/>TikTok Sound</a>}
          {camp.igUrl&&<a href={camp.igUrl} target="_blank" className="bo"><Ig s={12} c={IG}/>IG Audio</a>}
          {camp.spUrl&&<a href={camp.spUrl} target="_blank" className="bo"><Sv s={12} c={SP}/>Spotify</a>}
          {!ro&&<button className="bo" onClick={()=>syncAll(camp)}><Rf s={12}/>Sync</button>}
          <button className="bo" onClick={copyShare}>{copied?"✓ Copied":"🔗 Share"}</button>
        </div>
      </div>

      {/* STATUS PIPELINE */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:"var(--t2)",textTransform:"uppercase",letterSpacing:".07em"}}>Post Pipeline</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {STATUS_ORDER.map((st,i)=>(
            <React.Fragment key={st}>
              <div style={{textAlign:"center",minWidth:80}}>
                <div style={{fontSize:22,fontWeight:800,color:STATUS_COLOR[st],letterSpacing:"-.5px"}}>{statusCounts[st]||0}</div>
                <div className={`tag ${STATUS_CLASS[st]}`} style={{marginTop:4}}>{STATUS_LABEL[st]}</div>
              </div>
              {i<STATUS_ORDER.length-1&&<div style={{color:"var(--b3)",fontSize:20,fontWeight:300}}>→</div>}
            </React.Fragment>
          ))}
          <div style={{marginLeft:"auto",fontSize:11,color:"var(--t3)"}}>Use ← → on each post card to advance status</div>
        </div>
      </div>

      {/* SOUND CREATES */}
      {(camp.ttUrl||camp.igUrl)&&(
        <div className="card pad" style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Sound Page — Videos Using This Sound</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {camp.ttUrl&&(
              <div style={{flex:1,minWidth:160,background:"var(--ta)",border:".5px solid rgba(105,201,208,0.25)",borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Tt s={14} c={TT}/><span style={{fontSize:10,fontWeight:700,color:TT,textTransform:"uppercase",letterSpacing:".05em"}}>TikTok Sound</span></div>
                <div style={{fontSize:32,fontWeight:800,color:TT,letterSpacing:"-.5px"}}>{soundStats.tt!=null?fmt(soundStats.tt):"—"}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>videos created with this sound</div>
              </div>
            )}
            {camp.igUrl&&(
              <div style={{flex:1,minWidth:160,background:"var(--ia)",border:".5px solid rgba(225,48,108,0.25)",borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Ig s={14} c={IG}/><span style={{fontSize:10,fontWeight:700,color:IG,textTransform:"uppercase",letterSpacing:".05em"}}>Instagram Audio</span></div>
                <div style={{fontSize:32,fontWeight:800,color:IG,letterSpacing:"-.5px"}}>{soundStats.ig!=null?fmt(soundStats.ig):"—"}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>reels created with this audio</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* PERFORMANCE TOTALS */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>Creator Post Performance</div>
            <div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>{posts.length} post{posts.length!==1?"s":""} · live metrics via RapidAPI</div>
          </div>
          {!ro&&<button className="bg" onClick={refreshAll} disabled={refAll}><Rf s={13} spin={refAll}/>{refAll?"Refreshing…":"Refresh All"}</button>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(115px,1fr))",gap:8}}>
          {[["Total Views",fmt(T.v),true],["Total Likes",fmt(T.l),false],["Total Comments",fmt(T.c_),false],["Total Saves",fmt(T.s),false],["Avg Eng Rate",totalEr,false],["Posts",String(posts.length),false]].map(([l,v,g])=>(
            <div key={l} className="card pad" style={{borderTop:g?`2px solid ${GOLD}`:undefined}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:5}}>{l}</div>
              <div style={{fontSize:20,fontWeight:800,color:g?GOLD:"var(--t1)",letterSpacing:"-.5px"}}>{v}</div>
            </div>
          ))}
        </div>
        {T.b>0&&(
          <div style={{marginTop:16,paddingTop:16,borderTop:".5px solid var(--b1)"}}>
            <div style={{fontSize:12,fontWeight:700,color:GOLD,marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>💰 Budget & ROI</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:10}}>
              {[
                ["Total Budget",fmtUSD(T.b),"rgba(201,168,76,0.08)","rgba(201,168,76,0.3)",GOLD],
                ["Est. Earned Media",fmtUSD(Math.round(emv)),"rgba(29,185,84,0.08)","rgba(29,185,84,0.3)",SP],
                ["ROI",(roi>=0?"+":"")+roi.toFixed(0)+"%",roi>=0?"rgba(29,185,84,0.08)":"rgba(229,57,57,0.08)",roi>=0?"rgba(29,185,84,0.3)":"rgba(229,57,57,0.3)",roi>=0?SP:"var(--red)"],
                ["Cost / View",cpv>0?"$"+cpv.toFixed(4):"—","var(--s2)","var(--b1)","var(--t1)"],
                ["Cost / Engagement",cpe>0?"$"+cpe.toFixed(2):"—","var(--s2)","var(--b1)","var(--t1)"],
              ].map(([l,v,bg,border,c])=>(
                <div key={l} style={{background:bg,borderRadius:10,padding:"10px 12px",border:`.5px solid ${border}`}}>
                  <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:c,letterSpacing:"-.3px"}}>{v}</div>
                </div>
              ))}
            </div>
            <p style={{fontSize:10,color:"var(--t3)",lineHeight:1.55}}>EMV based on ~$8 CPM music/entertainment industry benchmark · ROI = (EMV − Budget) ÷ Budget</p>
          </div>
        )}
      </div>

      {/* CREATOR POSTS */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>Creator Posts</div>
            <div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>Paste TikTok or Instagram URL · metrics auto-pull · status tracking · comments</div>
          </div>
          {!ro&&<button className="bg" onClick={()=>setModal("add")}>+ Add Post</button>}
        </div>
        {posts.length===0?(
          <div style={{textAlign:"center",padding:"3rem 1rem",border:".5px dashed var(--b2)",borderRadius:10}}>
            <div style={{fontSize:32,marginBottom:12}}>🎬</div>
            <p style={{fontSize:14,fontWeight:600,marginBottom:6}}>No creator posts yet</p>
            <p style={{fontSize:12,color:"var(--t2)",marginBottom:16,maxWidth:440,margin:"0 auto 16px",lineHeight:1.7}}>Paste any TikTok or Instagram URL — views, likes, comments pull automatically. Track draft → in review → approved → live status per post.</p>
            {!ro&&<button className="bg" onClick={()=>setModal("add")}>Add First Post</button>}
          </div>
        ):(
          <div className="sx" style={{paddingTop:2}}>
            {posts.map(p=>(
              <PostCard
                key={p.id}
                post={p}
                onRefresh={()=>refreshOne(p)}
                onEdit={()=>{setEditTgt(p);setModal("edit-post")}}
                onDelete={()=>{setEditTgt(p);setModal("del")}}
                onStatusChange={changeStatus}
                onAddComment={addComment}
                ro={ro}
              />
            ))}
          </div>
        )}
      </div>

      {/* CHARTEX EMBED */}
      {camp.cxUrl&&<CxEmbed url={camp.cxUrl}/>}

      {/* SPOTIFY */}
      {spMeta&&(
        <div className="card pad" style={{marginBottom:14,display:"grid",gridTemplateColumns:"auto 1fr",gap:16,alignItems:"center"}}>
          <img src={spMeta.art} alt="" style={{width:80,height:80,borderRadius:8,objectFit:"cover",border:".5px solid var(--b1)"}}/>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <Sv s={16} c={SP}/>
              <span style={{fontSize:14,fontWeight:700}}>{spMeta.name}</span>
              <span style={{fontSize:12,color:"var(--t2)"}}>· {spMeta.artist}</span>
            </div>
            {spMeta.pop!=null&&(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,height:4,background:"var(--s2)",borderRadius:2,overflow:"hidden",maxWidth:220}}>
                  <div style={{height:"100%",width:spMeta.pop+"%",background:SP,borderRadius:2}}/>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:SP}}>{spMeta.pop}/100</span>
                {camp.spUrl&&<a href={camp.spUrl} target="_blank" style={{background:SP,color:"#000",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>Open in Spotify</a>}
              </div>
            )}
          </div>
        </div>
      )}

      {/* SHARE */}
      <div className="card pad" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div style={{minWidth:0}}>
          <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:3}}>Public share link — no login required</p>
          <p style={{fontSize:11,color:GOLD,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shareUrl}</p>
        </div>
        <button className="bg" onClick={copyShare} style={{flexShrink:0}}>{copied?"✓ Copied!":"Copy Link"}</button>
      </div>

      {/* MODALS */}
      {modal==="add"&&<Modal title="Add Creator Post" onClose={()=>setModal(null)} mw={700}><PostForm cfg={cfg} onSubmit={addPost} onClose={()=>setModal(null)}/></Modal>}
      {modal==="edit-post"&&editTgt&&<Modal title="Edit Creator Post" onClose={()=>{setModal(null);setEditTgt(null)}} mw={700}><PostForm initial={editTgt} cfg={cfg} onSubmit={saveEdit} onClose={()=>{setModal(null);setEditTgt(null)}} label="Save Changes"/></Modal>}
      {modal==="edit-camp"&&<Modal title="Edit Campaign" onClose={()=>setModal(null)} mw={600}><CampForm init={camp} onSubmit={saveCamp} onClose={()=>setModal(null)}/></Modal>}
      {modal==="del"&&editTgt&&(
        <Modal title="Remove Post?" onClose={()=>{setModal(null);setEditTgt(null)}} mw={400}>
          <p style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Remove @{editTgt.handle||"this creator"}'s post?</p>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="bo" onClick={()=>{setModal(null);setEditTgt(null)}}>Cancel</button>
            <button className="bg" style={{background:"var(--red)"}} onClick={()=>removePost(editTgt.id)}>Remove</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── CAMPAIGN LIST
function CampaignList({db_,onDbChange}){
  const camps=db_?.campaigns||[];
  const[modal,setModal]=useState(null);
  const[editTgt,setEditTgt]=useState(null);
  const[del,setDel]=useState(null);

  const create=f=>{const c={...f,id:uid(),createdAt:Date.now()};onDbChange({...db_,campaigns:[...camps,c]});setModal(null);location.hash="/campaign/"+c.id};
  const update=f=>{onDbChange({...db_,campaigns:camps.map(c=>c.id===editTgt.id?{...c,...f}:c)});setModal(null);setEditTgt(null)};
  const remove=cid=>{const posts={...(db_?.posts||{})};delete posts[cid];onDbChange({...db_,campaigns:camps.filter(c=>c.id!==cid),posts});setDel(null)};

  // Total post counts by status across all campaigns
  const allPosts=Object.values(db_?.posts||{}).flat();
  const totalLive=allPosts.filter(p=>p.status==="live").length;
  const totalApproved=allPosts.filter(p=>p.status==="approved").length;
  const totalReview=allPosts.filter(p=>p.status==="review").length;

  return(
    <div className="page">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:28,fontWeight:800,letterSpacing:"-.5px"}}><span style={{color:GOLD}}>✦</span> Creator Campaigns</h1>
          <p style={{color:"var(--t2)",marginTop:4,fontSize:13}}>Live metrics · Status pipeline · Comments · Cross-device sync</p>
        </div>
        <button className="bg" onClick={()=>setModal("create")}>+ New Campaign</button>
      </div>

      {/* Global status bar */}
      {allPosts.length>0&&(
        <div className="card pad" style={{marginBottom:20,display:"flex",gap:18,flexWrap:"wrap"}}>
          {[["Live",totalLive,STATUS_COLOR.live],["Approved",totalApproved,STATUS_COLOR.approved],["In Review",totalReview,STATUS_COLOR.review],["Total Posts",allPosts.length,GOLD]].map(([l,v,c])=>(
            <div key={l} style={{textAlign:"center"}}>
              <div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"var(--t2)",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      )}

      {camps.length===0?(
        <div className="card" style={{padding:"5rem 2rem",textAlign:"center"}}>
          <div style={{fontSize:44,color:GOLD,marginBottom:18}}>✦</div>
          <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>No campaigns yet</h2>
          <p style={{fontSize:13,color:"var(--t2)",maxWidth:460,margin:"0 auto 20px",lineHeight:1.7}}>Create a campaign with your TikTok sound, IG audio, Spotify and Chartex links. Track creator posts from draft to live.</p>
          <button className="bg" onClick={()=>setModal("create")}>Create Campaign</button>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
          {camps.map(c=>{
            const campPosts=((db_?.posts||{})[c.id])||[];
            const livePosts=campPosts.filter(p=>p.status==="live").length;
            const totalView=campPosts.reduce((a,p)=>a+Number(p.views||0),0);
            return(
              <div key={c.id} className="card pad" style={{cursor:"pointer",transition:"border-color .15s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.35)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--b1)"}
                onClick={()=>location.hash="/campaign/"+c.id}>
                <div style={{display:"flex",gap:12,marginBottom:12}}>
                  <div style={{width:42,height:42,borderRadius:8,background:"var(--ga)",border:".5px solid var(--gb)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{color:GOLD,fontSize:22}}>✦</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</p>
                    <p style={{fontSize:12,color:"var(--t2)",marginTop:2}}>{c.artist}</p>
                  </div>
                </div>
                {c.desc&&<p style={{fontSize:12,color:"var(--t2)",lineHeight:1.5,marginBottom:10}}>{c.desc}</p>}
                {/* Quick stats */}
                {campPosts.length>0&&(
                  <div style={{display:"flex",gap:10,marginBottom:10}}>
                    <span style={{fontSize:11,color:GOLD,fontWeight:700}}>{campPosts.length} posts</span>
                    {livePosts>0&&<span style={{fontSize:11,color:STATUS_COLOR.live}}>🔴 {livePosts} live</span>}
                    {totalView>0&&<span style={{fontSize:11,color:"var(--t2)"}}>{fmt(totalView)} views</span>}
                  </div>
                )}
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {c.ttUrl&&<span className="tag" style={{background:"var(--ta)",color:TT}}><Tt s={9} c={TT}/>TikTok</span>}
                  {c.igUrl&&<span className="tag" style={{background:"var(--ia)",color:IG}}><Ig s={9} c={IG}/>Instagram</span>}
                  {c.spUrl&&<span className="tag" style={{background:"rgba(29,185,84,0.11)",color:SP}}><Sv s={9} c={SP}/>Spotify</span>}
                  {c.cxUrl&&<span className="tag" style={{background:"var(--ta)",color:TT}}>Chartex Live</span>}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:12,borderTop:".5px solid var(--b1)"}}>
                  <span style={{fontSize:11,color:"var(--t3)"}}>{new Date(c.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                  <div style={{display:"flex",gap:6}}>
                    <button className="bo" style={{padding:"3px 9px",fontSize:11}} onClick={e=>{e.stopPropagation();setEditTgt(c);setModal("edit")}}><Pn s={10}/>Edit</button>
                    <button className="bo" style={{padding:"3px 9px",fontSize:11,color:"var(--t3)"}} onClick={e=>{e.stopPropagation();setDel(c.id)}}>Delete</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modal==="create"&&<Modal title="New Campaign" onClose={()=>setModal(null)} mw={600}><CampForm onSubmit={create} onClose={()=>setModal(null)}/></Modal>}
      {modal==="edit"&&editTgt&&<Modal title="Edit Campaign" onClose={()=>{setModal(null);setEditTgt(null)}} mw={600}><CampForm init={editTgt} onSubmit={update} onClose={()=>{setModal(null);setEditTgt(null)}}/></Modal>}
      {del&&(
        <Modal title="Delete Campaign?" onClose={()=>setDel(null)} mw={400}>
          <p style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Delete this campaign and all its posts?</p>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="bo" onClick={()=>setDel(null)}>Cancel</button>
            <button className="bg" style={{background:"var(--red)"}} onClick={()=>remove(del)}>Delete</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── APP
function App(){
  const[hash,setHash]=useState(location.hash||"");
  const[cfg,setCfg]=useState(null);
  const[db_,setDb]=useState(null);
  const[ready,setReady]=useState(false);
  const[error,setError]=useState(null);
  const saving=useRef(false);
  const pending=useRef(null);

  useEffect(()=>{
    (async()=>{
      let serverCfg={};
      try{const r=await fetch("/config");if(r.ok)serverCfg=await r.json()}catch(e){console.warn("fetch /config failed:",e)}
      setCfg(serverCfg);
      let data=null;
      if(serverCfg.jbKey&&serverCfg.jbBin){
        data=await jbRead(serverCfg.jbKey,serverCfg.jbBin);
      }
      if(!data){
        if(!serverCfg.jbKey||!serverCfg.jbBin)setError("JSONBIN_KEY or JSONBIN_BIN not set on Render. Data will not sync across devices.");
        data={campaigns:[],posts:{}};
      }
      setDb(data);
      setReady(true);
    })();
    const h=()=>setHash(location.hash||"");
    window.addEventListener("hashchange",h);
    return()=>window.removeEventListener("hashchange",h);
  },[]);

  const onDbChange=useCallback(async updated=>{
    setDb(updated);
    if(pending.current)clearTimeout(pending.current);
    pending.current=setTimeout(async()=>{
      if(cfg?.jbKey&&cfg?.jbBin&&!saving.current){
        saving.current=true;
        await jbWrite(cfg.jbKey,cfg.jbBin,updated);
        saving.current=false;
      }
    },500);
  },[cfg]);

  if(!ready){
    return(
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,color:"var(--t3)",fontSize:13}}>
        <div className="spin" style={{width:22,height:22,border:"2px solid rgba(255,255,255,0.08)",borderTopColor:GOLD,borderRadius:"50%"}}></div>
        Loading from JSONbin…
      </div>
    );
  }

  const h=(hash||"").replace("#","");
  let page;
  if(h.startsWith("/campaign/")){
    const id=h.split("/")[2];
    page=<Dashboard id={id} ro={false} cfg={cfg} db_={db_} onDbChange={onDbChange}/>;
  }else if(h.startsWith("/view/")){
    const id=h.split("/")[2];
    page=<Dashboard id={id} ro={true} cfg={cfg} db_={db_} onDbChange={onDbChange}/>;
  }else{
    page=<CampaignList db_={db_} onDbChange={onDbChange} cfg={cfg}/>;
  }

  return(
    <>
      {error&&<div style={{background:"rgba(229,57,57,0.12)",border:".5px solid rgba(229,57,57,0.4)",padding:"10px 20px",fontSize:12,color:"#f87171",textAlign:"center"}}>⚠ {error}</div>}
      {page}
    </>
  );
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}catch(e){
  document.getElementById("root").innerHTML=`<div style="color:#e53e3e;padding:2rem;font-family:sans-serif;background:#111"><h2 style="margin-bottom:8px">Error</h2><pre style="font-size:12px;opacity:.7">${e.message}</pre></div>`;
}
</script>
</body>
</html>
