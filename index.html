<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Creator Campaign Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090909;--s1:#131313;--s2:#1d1d1d;--s3:#272727;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.22);
  --t1:#f0f0f0;--t2:rgba(240,240,240,0.52);--t3:rgba(240,240,240,0.26);
  --gold:#C9A84C;--ga:rgba(201,168,76,0.12);--gb:rgba(201,168,76,0.32);
  --tt:#69C9D0;--ta:rgba(105,201,208,0.11);
  --ig:#E1306C;--ia:rgba(225,48,108,0.11);
  --sp:#1DB954;--sa:rgba(29,185,84,0.11);
  --red:#e53e3e;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none}
input,select{font-family:inherit;outline:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page{padding:1.75rem 2rem;max-width:1300px;margin:0 auto;animation:up .2s ease}
.card{background:var(--s1);border:.5px solid var(--b1);border-radius:14px}
.pad{padding:1.25rem}
.inp{width:100%;padding:9px 12px;background:var(--s2);border:.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:13px;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--t3)}
select.inp option{background:var(--s2)}
.bg{background:var(--gold);color:#000;font-weight:700;font-size:13px;padding:8px 16px;border-radius:10px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s}
.bg:hover{opacity:.88}.bg:disabled{opacity:.45;cursor:not-allowed}
.bo{background:var(--s2);color:var(--t2);border:.5px solid var(--b2);font-size:12px;padding:6px 13px;border-radius:10px;display:inline-flex;align-items:center;gap:5px;transition:border-color .15s}
.bo:hover{border-color:var(--b3)}
.lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px 40px;z-index:999;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#181818;border:.5px solid var(--b2);border-radius:14px;width:100%;padding:1.5rem;box-shadow:0 40px 100px rgba(0,0,0,.8);animation:up .15s ease}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sx{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.hr{height:.5px;background:var(--b1);margin:14px 0}
.spin{animation:spin .7s linear infinite;display:inline-block;line-height:1}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--t3);font-size:13px;flex-direction:column;gap:12px"><div class="spin" style="width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%"></div>Loading…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── CONSTANTS ──────────────────────────────────────────────
const GOLD="#C9A84C",TT="#69C9D0",IG="#E1306C",SP="#1DB954";
const CX="https://api.chartex.com/external/v1";
const JBIN="https://api.jsonbin.io/v3";
const TT_HOST="tiktok-api23.p.rapidapi.com";
const IG_HOST="instagram-scraper-stable-api.p.rapidapi.com";

// ── UTILS ──────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=n=>{n=Number(n)||0;if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return Math.round(n).toLocaleString()};
const ttVideoId=u=>(u||"").match(/video\/(\d{10,25})/)?.[1]||null;
const ttMusicId=u=>(u||"").match(/music\/[^?/]*?(\d{10,25})/)?.[1]||null;
const ttUser=u=>(u||"").match(/@([^/?&\s]+)/)?.[1]||null;
const igCode=u=>(u||"").match(/\/(p|reel|tv)\/([A-Za-z0-9_-]+)/)?.[2]||null;
const spTrackId=u=>(u||"").match(/track\/([A-Za-z0-9]+)/)?.[1]||null;
const getPlatform=u=>{if(!u)return null;if(u.includes("tiktok.com"))return"tiktok";if(u.includes("instagram.com"))return"instagram";return null};

// ── LOCAL CACHE (speed) ────────────────────────────────────
const lc=(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const lw=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ── JSONBIN — single source of truth across all devices ────
async function jbRead(key,binId){
  if(!key||!binId)return null;
  try{
    const r=await fetch(`${JBIN}/b/${binId}/latest`,{headers:{"X-Master-Key":key}});
    if(!r.ok)return null;
    return(await r.json()).record||null;
  }catch{return null}
}
async function jbWrite(key,binId,data){
  if(!key||!binId)return;
  try{
    await fetch(`${JBIN}/b/${binId}`,{
      method:"PUT",
      headers:{"X-Master-Key":key,"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
  }catch{}
}

// ── RAPIDAPI: TIKTOK POST ──────────────────────────────────
async function fetchTTPost(videoId,key){
  if(!videoId||!key)return null;
  try{
    const r=await fetch(`https://${TT_HOST}/api/post/detail?videoId=${videoId}`,{
      headers:{"x-rapidapi-key":key,"x-rapidapi-host":TT_HOST,"Content-Type":"application/json"}
    });
    if(!r.ok)return null;
    const d=await r.json();
    const item=d?.itemInfo?.itemStruct||d?.data?.itemInfo?.itemStruct||d?.item||d?.data||d;
    const stats=item?.stats||item?.statistics||{};
    const video=item?.video||{};
    const author=item?.author||{};
    return{
      views:   stats.playCount   ||stats.play_count   ||null,
      likes:   stats.diggCount   ||stats.digg_count   ||null,
      comments:stats.commentCount||stats.comment_count||null,
      saves:   stats.collectCount||stats.collect_count||null,
      thumbnail:video.cover||video.dynamicCover||video.originCover||null,
      handle:  author.uniqueId   ||author.unique_id   ||author.nickname||null,
      caption: item?.desc        ||item?.description  ||null,
    };
  }catch{return null}
}

// ── RAPIDAPI: TIKTOK MUSIC ─────────────────────────────────
async function fetchTTMusic(musicId,key){
  if(!musicId||!key)return null;
  try{
    const r=await fetch(`https://${TT_HOST}/api/music/info?musicId=${musicId}`,{
      headers:{"x-rapidapi-key":key,"x-rapidapi-host":TT_HOST,"Content-Type":"application/json"}
    });
    if(!r.ok)return null;
    const d=await r.json();
    const stats=d?.musicInfo?.stats||d?.data?.musicInfo?.stats||d?.stats||{};
    return{videoCount:stats.videoCount||null};
  }catch{return null}
}

// ── RAPIDAPI: INSTAGRAM POST ───────────────────────────────
async function fetchIGPost(code,key){
  if(!code||!key)return null;
  try{
    const r=await fetch(`https://${IG_HOST}/get_media_data_v2.php?media_code=${code}`,{
      headers:{"x-rapidapi-key":key,"x-rapidapi-host":IG_HOST,"Content-Type":"application/json"}
    });
    if(!r.ok)return null;
    const d=await r.json();
    const item=d?.data||d?.media||d?.item||d;
    return{
      views:    item?.video_view_count||item?.view_count||null,
      likes:    item?.like_count      ||item?.likes_count||null,
      comments: item?.comment_count   ||null,
      saves:    item?.saved_count     ||null,
      thumbnail:item?.thumbnail_url   ||item?.image_url||item?.display_url||null,
      handle:   item?.owner?.username ||item?.user?.username||null,
      caption:  item?.caption?.text   ||item?.caption||null,
    };
  }catch{return null}
}

// ── PULL CREATOR POST ──────────────────────────────────────
async function pullPost(url,cfg){
  const platform=getPlatform(url);
  if(!platform||!cfg?.rapidKey)return null;
  const base={platform,postUrl:url,handle:"",thumbnail:null,views:null,likes:null,comments:null,saves:null};
  if(platform==="tiktok"){
    const vid=ttVideoId(url);
    const data=vid?await fetchTTPost(vid,cfg.rapidKey):null;
    if(data)return{...base,...data,platform:"tiktok"};
    return{...base,handle:ttUser(url)||""};
  }
  if(platform==="instagram"){
    const code=igCode(url);
    const data=code?await fetchIGPost(code,cfg.rapidKey):null;
    if(data)return{...base,...data,platform:"instagram"};
    return base;
  }
  return base;
}

// ── SPOTIFY ────────────────────────────────────────────────
async function spGetToken(id,sec){
  try{const r=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:`grant_type=client_credentials&client_id=${id}&client_secret=${sec}`});return r.ok?(await r.json()).access_token:null}catch{return null}
}
async function spGetTrack(tid,tok){
  try{const r=await fetch(`https://api.spotify.com/v1/tracks/${tid}`,{headers:{Authorization:`Bearer ${tok}`}});if(!r.ok)return null;const t=await r.json();return{name:t.name,artist:t.artists?.map(a=>a.name).join(", "),art:t.album?.images?.[0]?.url,pop:t.popularity}}catch{return null}
}

// ── CHARTEX ────────────────────────────────────────────────
async function cxGet(path,cfg){
  if(!cfg?.cxId||!cfg?.cxToken)return null;
  try{const r=await fetch(CX+path,{headers:{"X-APP-ID":cfg.cxId,"X-APP-TOKEN":cfg.cxToken}});return r.ok?(await r.json()):null}catch{return null}
}
async function cxFindSong(cfg,sid,name){
  const p=sid?`/songs/?spotify_id=${sid}&limit=3`:`/songs/?search=${encodeURIComponent(name||"")}&limit=5`;
  const d=await cxGet(p,cfg);const a=d?.data?.items||d?.items||(Array.isArray(d)?d:[]);return a[0]||null;
}
async function cxSongStats(cfg,id){const d=await cxGet(`/songs/${id}/`,cfg);return d?.data||d||null}

// ── ICONS ──────────────────────────────────────────────────
const Tt=({s=16,c=TT})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.26 8.26 0 004.84 1.56V6.8a4.85 4.85 0 01-1.07-.11z"/></svg>;
const Ig=({s=16,c=IG})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>;
const Sv=({s=16,c=SP})=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>;
const Rf=({s=13,c="currentColor",spin})=><svg className={spin?"spin":""} width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>;
const Pn=({s=12,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

const PC={
  tiktok:{label:"TikTok",grad:"linear-gradient(150deg,#0d0d20,#3d2c8d,#ee1d52)",I:Tt},
  instagram:{label:"Instagram",grad:"linear-gradient(150deg,#833ab4,#fd1d1d,#fcb045)",I:Ig},
  youtube:{label:"YouTube",grad:"linear-gradient(150deg,#c4302b,#ff9900)",I:({s,c})=><span style={{fontSize:s,color:c}}>▶</span>},
  twitter:{label:"X/Twitter",grad:"linear-gradient(150deg,#1da1f2,#14171a)",I:({s,c})=><span style={{fontSize:s,color:c,fontWeight:700}}>𝕏</span>},
};

// ── MODAL ──────────────────────────────────────────────────
function Modal({title,onClose,children,mw=500}){
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:mw}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
          <h2 style={{fontSize:16,fontWeight:700}}>{title}</h2>
          <button className="bo" onClick={onClose} style={{padding:"3px 10px",fontSize:15}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── POST FORM ──────────────────────────────────────────────
function PostForm({initial,onSubmit,onClose,cfg,label}){
  const[url,setUrl]=useState(initial?.postUrl||"");
  const[st,setSt]=useState(initial?.postUrl?"done":"idle");
  const[f,setF]=useState({
    platform:initial?.platform||"tiktok",handle:initial?.handle||"",
    thumbnail:initial?.thumbnail||"",views:initial?.views||"",
    likes:initial?.likes||"",comments:initial?.comments||"",saves:initial?.saves||"",
  });
  const db=useRef(null);
  const sf=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const doFetch=useCallback(async raw=>{
    const u=raw.trim();
    if(!getPlatform(u)){setSt("idle");return}
    setSt("fetching");
    const d=await pullPost(u,cfg);
    if(d&&(d.views!=null||d.likes!=null||d.thumbnail||d.handle)){
      setF(prev=>({...prev,
        platform:d.platform||prev.platform,
        handle:d.handle||prev.handle,
        thumbnail:d.thumbnail||prev.thumbnail,
        views:d.views!=null?String(d.views):prev.views,
        likes:d.likes!=null?String(d.likes):prev.likes,
        comments:d.comments!=null?String(d.comments):prev.comments,
        saves:d.saves!=null?String(d.saves):prev.saves,
      }));
      setSt("done");
    }else setSt("error");
  },[cfg]);

  const onU=e=>{
    const v=e.target.value;setUrl(v);clearTimeout(db.current);
    if(v.trim().length>20&&getPlatform(v)){
      setSt("fetching");db.current=setTimeout(()=>doFetch(v),800);
    }else setSt("idle");
  };

  const vv=Number(f.views)||0,lk=Number(f.likes)||0,cm=Number(f.comments)||0;
  const er=vv>0?((lk+cm)/vv*100).toFixed(2)+"%":"—";
  const P=PC[f.platform]||PC.tiktok;
  const stC={idle:"var(--t3)",fetching:GOLD,done:SP,error:IG};
  const stM={idle:"Paste a TikTok or Instagram post URL — metrics pull automatically",fetching:"Fetching live metrics via RapidAPI…",done:"✓ Live metrics loaded — edit any field if needed",error:"Couldn't pull metrics. Check post is public, then fill in manually."};

  return(
    <>
      <div style={{marginBottom:14}}>
        <label className="lbl">Post URL</label>
        <div style={{position:"relative"}}>
          <input className="inp" placeholder="https://www.tiktok.com/@creator/video/... or instagram.com/reel/..." value={url} onChange={onU} style={{paddingRight:34}}/>
          {st==="fetching"&&<span className="spin" style={{position:"absolute",right:10,top:"50%",marginTop:-7}}><Rf s={14} c={GOLD}/></span>}
          {st==="done"&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:SP,fontWeight:700,fontSize:14}}>✓</span>}
        </div>
        <p style={{fontSize:11,marginTop:5,color:stC[st],fontWeight:st==="idle"?400:600}}>{stM[st]}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"175px 1fr",gap:18,alignItems:"start"}}>
        <div>
          <label className="lbl">Preview</label>
          <div style={{width:175,height:311,borderRadius:10,overflow:"hidden",position:"relative",background:f.thumbnail?`url(${f.thumbnail}) center/cover no-repeat`:P.grad,border:".5px solid var(--b2)"}}>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%)"}}/>
            <div style={{position:"absolute",top:9,left:9,background:"rgba(0,0,0,.68)",borderRadius:6,padding:"3px 8px",display:"flex",alignItems:"center",gap:4}}><P.I s={11} c="#fff"/><span style={{color:"#fff",fontSize:10,fontWeight:700}}>{P.label}</span></div>
            <div style={{position:"absolute",bottom:10,left:10,right:10}}><p style={{color:"#fff",fontSize:13,fontWeight:700}}>@{f.handle||"creator"}</p></div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div className="g2">
            <div><label className="lbl">Platform</label><select className="inp" value={f.platform} onChange={sf("platform")}>{Object.keys(PC).map(k=><option key={k} value={k}>{PC[k].label}</option>)}</select></div>
            <div><label className="lbl">Handle</label><input className="inp" placeholder="@username" value={f.handle} onChange={sf("handle")}/></div>
          </div>
          <div><label className="lbl">Thumbnail URL</label><input className="inp" placeholder="auto-pulled or paste direct image URL" value={f.thumbnail} onChange={sf("thumbnail")}/></div>
          <div className="g2">
            <div><label className="lbl">Views</label><input className="inp" type="number" min="0" placeholder="0" value={f.views} onChange={sf("views")}/></div>
            <div><label className="lbl">Likes</label><input className="inp" type="number" min="0" placeholder="0" value={f.likes} onChange={sf("likes")}/></div>
            <div><label className="lbl">Comments</label><input className="inp" type="number" min="0" placeholder="0" value={f.comments} onChange={sf("comments")}/></div>
            <div><label className="lbl">Saves</label><input className="inp" type="number" min="0" placeholder="0" value={f.saves} onChange={sf("saves")}/></div>
          </div>
          <div style={{background:"var(--s2)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",border:".5px solid var(--b1)"}}>
            <span style={{fontSize:11,color:"var(--t2)"}}>Engagement Rate (auto)</span>

          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
            <button className="bo" onClick={onClose}>Cancel</button>

          </div>
        </div>
      </div>
    </>
  );
}

          {isRef&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.65)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><span className="spin"><Rf s={24} c="#fff"/></span><span style={{color:"#fff",fontSize:11,fontWeight:600}}>Fetching…</span></div>}

          <div key={l} style={{background:"var(--s2)",borderRadius:7,padding:"6px 8px",border:".5px solid var(--b1)"}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginBottom:1}}>{l}</div>
            <div style={{fontSize:13,fontWeight:700,color:c}}>{v||"—"}</div>

      {post.saves&&<div style={{background:"var(--s2)",borderRadius:7,padding:"5px 8px",border:".5px solid var(--b1)",marginTop:4,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>💾 Saves</span><span style={{fontSize:12,fontWeight:700}}>{fmt(post.saves)}</span></div>}

// ── DASHBOARD ──────────────────────────────────────────────
function Dashboard({id,ro,cfg,dbData,onDbChange}){
  const camps=dbData.campaigns||[];
  const camp=camps.find(c=>c.id===id)||null;
  const posts=(dbData.posts||{})[id]||[];

  const[spMeta,setSpMeta]=useState(null);
  const[soundStats,setSoundStats]=useState({tt:null,ig:null});
  const[syncing,setSyncing]=useState(false);
  const[refreshingAll,setRefreshingAll]=useState(false);
  const[modal,setModal]=useState(null);
  const[editTgt,setEditTgt]=useState(null);
  const[copied,setCopied]=useState(false);

  const setPosts=useCallback(next=>{
    const clean=next.map(({_ref,...r})=>r);
    onDbChange({...dbData,posts:{...(dbData.posts||{}),[id]:clean}});
  },[id,dbData,onDbChange]);

  useEffect(()=>{if(camp)syncAll(camp)},[id]);

  const syncAll=async c=>{
    setSyncing(true);
    // Spotify
    if(c.spUrl&&cfg?.spId&&cfg?.spSec){
      try{const tok=await spGetToken(cfg.spId,cfg.spSec);const tid=spTrackId(c.spUrl);if(tok&&tid){const m=await spGetTrack(tid,tok);if(m)setSpMeta(m)}}catch{}
    }
    // TikTok sound creates via RapidAPI music/info
    const ns={tt:null,ig:null};
    if(c.ttUrl&&cfg?.rapidKey){
      const mid=ttMusicId(c.ttUrl);
      if(mid){const m=await fetchTTMusic(mid,cfg.rapidKey);if(m?.videoCount!=null)ns.tt=m.videoCount;}
    }
    // Chartex fallback for sound stats
    if(cfg?.cxId&&cfg?.cxToken){
      try{
        const sid=spTrackId(c.spUrl);
        let song=sid?await cxFindSong(cfg,sid,null):null;
        if(!song&&c.artist)song=await cxFindSong(cfg,null,c.artist+" "+c.name);
        if(song){
          const stats=await cxSongStats(cfg,song.id||song.song_id||song.chartex_id);
          if(stats){
            if(ns.tt==null)ns.tt=stats.tiktok_total_video_count||stats.total_video_count||null;
            ns.ig=stats.instagram_reels_count||stats.reels_count||null;
          }
        }
      }catch{}
    }
    setSoundStats(ns);
    setSyncing(false);
  };

  const addPost=data=>{setPosts([...posts,{...data,id:uid(),addedAt:Date.now(),_at:Date.now()}]);setModal(null)};
  const saveEdit=data=>{setPosts(posts.map(p=>p.id===editTgt.id?{...p,...data,_at:Date.now()}:p));setModal(null);setEditTgt(null)};
  const removePost=pid=>{setPosts(posts.filter(p=>p.id!==pid));setModal(null);setEditTgt(null)};

  const refreshOne=useCallback(async p=>{
    if(!cfg?.rapidKey)return;
    onDbChange({...dbData,posts:{...(dbData.posts||{}),[id]:posts.map(x=>x.id===p.id?{...x,_ref:true}:x)}});
    const d=await pullPost(p.postUrl,cfg);
    const next=posts.map(x=>x.id===p.id?{...x,...(d||{}),_ref:false,_at:Date.now()}:x);
    setPosts(next);
  },[id,posts,dbData,cfg,onDbChange]);

  const refreshAll=useCallback(async()=>{
    if(refreshingAll||!cfg?.rapidKey)return;
    setRefreshingAll(true);
    onDbChange({...dbData,posts:{...(dbData.posts||{}),[id]:posts.map(p=>({...p,_ref:true}))}});
    const next=await Promise.all(posts.map(async p=>{const d=await pullPost(p.postUrl,cfg);return{...p,...(d||{}),_ref:false,_at:Date.now()}}));
    setPosts(next);setRefreshingAll(false);
  },[id,posts,dbData,cfg,onDbChange,refreshingAll]);

  const saveCamp=data=>{onDbChange({...dbData,campaigns:camps.map(c=>c.id===id?{...c,...data}:c)});setModal(null)};

  const T=posts.reduce((a,p)=>({v:a.v+(Number(p.views)||0),l:a.l+(Number(p.likes)||0),c_:a.c_+(Number(p.comments)||0),s:a.s+(Number(p.saves)||0)}),{v:0,l:0,c_:0,s:0});
  const totalEr=T.v>0?((T.l+T.c_)/T.v*100).toFixed(2)+"%":"—";
  const shareUrl=`${location.origin}${location.pathname}#/view/${id}`;
  const copyShare=()=>{try{navigator.clipboard.writeText(shareUrl)}catch{};setCopied(true);setTimeout(()=>setCopied(false),2200)};

  if(!camp)return<div style={{textAlign:"center",padding:"4rem"}}><p style={{color:"var(--t2)",marginBottom:16}}>Campaign not found.</p><button className="bg" onClick={()=>location.hash="/"}>← Back</button></div>;

  return(
    <div className="page">
      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem",gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {!ro&&<button className="bo" onClick={()=>location.hash="/"} style={{fontSize:12}}>← Back</button>}
          {spMeta?.art&&<img src={spMeta.art} alt="" style={{width:52,height:52,borderRadius:8,objectFit:"cover",border:".5px solid var(--b2)"}}/>}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-.3px"}}>{camp.name}</h1>
              {!ro&&<button className="bo" onClick={()=>setModal("edit-camp")} style={{padding:"4px 8px",fontSize:11}}><Pn s={10}/>Edit</button>}
              {ro&&<span className="tag" style={{background:"var(--ga)",color:GOLD,border:".5px solid var(--gb)"}}>PUBLIC VIEW</span>}
              {syncing&&<span style={{fontSize:11,color:"var(--t3)",display:"flex",alignItems:"center",gap:4}}><span className="spin"><Rf s={10}/></span>Syncing…</span>}
            </div>
            <p style={{color:"var(--t2)",fontSize:13,marginTop:2}}>{camp.artist}{spMeta?.name&&<> · <strong style={{color:"var(--t1)"}}>{spMeta.name}</strong></>}{spMeta?.pop!=null&&<span style={{marginLeft:8,color:GOLD,fontWeight:700,fontSize:12}}>★ {spMeta.pop}/100</span>}</p>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {camp.ttUrl&&<a href={camp.ttUrl} target="_blank" className="bo"><Tt s={12} c={TT}/>TikTok Sound</a>}
          {camp.igUrl&&<a href={camp.igUrl} target="_blank" className="bo"><Ig s={12} c={IG}/>IG Audio</a>}
          {camp.spUrl&&<a href={camp.spUrl} target="_blank" className="bo"><Sv s={12} c={SP}/>Spotify</a>}
          {!ro&&<button className="bo" onClick={()=>syncAll(camp)}><Rf s={12}/>Sync</button>}
          <button className="bo" onClick={copyShare}>{copied?"✓ Copied":"🔗 Share"}</button>
        </div>
      </div>

      {/* SOUND CREATES */}
      {(camp.ttUrl||camp.igUrl)&&(
        <div className="card pad" style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Sound Page — Videos Using This Sound</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {camp.ttUrl&&<div style={{flex:1,minWidth:160,background:"var(--ta)",border:".5px solid rgba(105,201,208,0.25)",borderRadius:10,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Tt s={14} c={TT}/><span style={{fontSize:10,fontWeight:700,color:TT,textTransform:"uppercase",letterSpacing:".05em"}}>TikTok Sound</span></div>
              <div style={{fontSize:32,fontWeight:800,color:TT,letterSpacing:"-.5px"}}>{soundStats.tt!=null?fmt(soundStats.tt):"—"}</div>
              <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>videos created with this sound</div>
            </div>}
            {camp.igUrl&&<div style={{flex:1,minWidth:160,background:"var(--ia)",border:".5px solid rgba(225,48,108,0.25)",borderRadius:10,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Ig s={14} c={IG}/><span style={{fontSize:10,fontWeight:700,color:IG,textTransform:"uppercase",letterSpacing:".05em"}}>Instagram Audio</span></div>
              <div style={{fontSize:32,fontWeight:800,color:IG,letterSpacing:"-.5px"}}>{soundStats.ig!=null?fmt(soundStats.ig):"—"}</div>
              <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>reels created with this audio</div>
            </div>}
          </div>
        </div>
      )}

      {/* CREATOR PERFORMANCE */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div><div style={{fontSize:13,fontWeight:700}}>Creator Post Performance</div><div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>{posts.length} post{posts.length!==1?"s":""} · live metrics via RapidAPI</div></div>
          {!ro&&<button className="bg" onClick={refreshAll} disabled={refreshingAll}><Rf s={13} spin={refreshingAll}/>{refreshingAll?"Refreshing…":"Refresh All"}</button>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(115px,1fr))",gap:8}}>
          {[["Total Views",fmt(T.v),true],["Total Likes",fmt(T.l)],["Total Comments",fmt(T.c_)],["Total Saves",fmt(T.s)],["Avg Eng Rate",totalEr],["Posts",String(posts.length)]].map(([l,v,g])=>(
            <div key={l} className="card pad" style={{borderTop:g?`2px solid ${GOLD}`:undefined}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:5}}>{l}</div>
              <div style={{fontSize:20,fontWeight:800,color:g?GOLD:"var(--t1)",letterSpacing:"-.5px"}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* CREATOR POSTS */}
      <div className="card pad" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div><div style={{fontSize:13,fontWeight:700}}>Creator Posts</div><div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>Paste any TikTok or Instagram URL · metrics auto-pull · permanent across all devices</div></div>
          {!ro&&<button className="bg" onClick={()=>setModal("add")}>+ Add Post</button>}
        </div>
        {posts.length===0?(
          <div style={{textAlign:"center",padding:"3rem 1rem",border:".5px dashed var(--b2)",borderRadius:10}}>
            <div style={{fontSize:32,marginBottom:12}}>🎬</div>
            <p style={{fontSize:14,fontWeight:600,marginBottom:6}}>No creator posts yet</p>
            <p style={{fontSize:12,color:"var(--t2)",marginBottom:16}}>Paste a TikTok or Instagram post URL — views, likes, comments and thumbnail pull automatically via RapidAPI. Saved permanently, visible on all devices.</p>
            {!ro&&<button className="bg" onClick={()=>setModal("add")}>Add First Post</button>}
          </div>
        ):(
          <div className="sx" style={{paddingTop:2}}>
            {posts.map(p=><PostCard key={p.id} post={p} onRefresh={()=>refreshOne(p)} onEdit={()=>{setEditTgt(p);setModal("edit-post")}} onDelete={()=>{setEditTgt(p);setModal("del")}} ro={ro}/>)}
          </div>
        )}
      </div>

      {/* CHARTEX EMBED */}
      {camp.cxUrl&&<CxEmbed url={camp.cxUrl}/>}

      {/* SPOTIFY */}
      {spMeta&&<div className="card pad" style={{marginBottom:14,display:"grid",gridTemplateColumns:"auto 1fr",gap:16,alignItems:"center"}}><img src={spMeta.art} alt="" style={{width:80,height:80,borderRadius:8,objectFit:"cover",border:".5px solid var(--b1)"}}/><div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><Sv s={16} c={SP}/><span style={{fontSize:14,fontWeight:700}}>{spMeta.name}</span><span style={{fontSize:12,color:"var(--t2)"}}>· {spMeta.artist}</span></div>{spMeta.pop!=null&&<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:4,background:"var(--s2)",borderRadius:2,overflow:"hidden",maxWidth:220}}><div style={{height:"100%",width:spMeta.pop+"%",background:SP,borderRadius:2}}/></div><span style={{fontSize:12,fontWeight:700,color:SP}}>{spMeta.pop}/100</span>{camp.spUrl&&<a href={camp.spUrl} target="_blank" style={{background:SP,color:"#000",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>Open in Spotify</a>}</div>}</div></div>}

      {/* SHARE */}
      <div className="card pad" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div style={{minWidth:0}}><p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t2)",marginBottom:3}}>Public share link — no login required</p><p style={{fontSize:11,color:GOLD,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shareUrl}</p></div>
        <button className="bg" onClick={copyShare} style={{flexShrink:0}}>{copied?"✓ Copied!":"Copy Link"}</button>
      </div>

      {/* MODALS */}
      {modal==="add"&&<Modal title="Add Creator Post" onClose={()=>setModal(null)} mw={700}><PostForm cfg={cfg} onSubmit={addPost} onClose={()=>setModal(null)}/></Modal>}
      {modal==="edit-post"&&editTgt&&<Modal title="Edit Creator Post" onClose={()=>{setModal(null);setEditTgt(null)}} mw={700}><PostForm initial={editTgt} cfg={cfg} onSubmit={saveEdit} onClose={()=>{setModal(null);setEditTgt(null)}} label="Save Changes"/></Modal>}
      {modal==="edit-camp"&&<Modal title="Edit Campaign" onClose={()=>setModal(null)} mw={600}><CampForm init={camp} onSubmit={saveCamp} onClose={()=>setModal(null)}/></Modal>}
      {modal==="del"&&editTgt&&<Modal title="Remove Post?" onClose={()=>{setModal(null);setEditTgt(null)}} mw={400}><p style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Remove @{editTgt.handle||"this creator"}'s post?</p><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button className="bo" onClick={()=>{setModal(null);setEditTgt(null)}}>Cancel</button><button className="bg" style={{background:"var(--red)"}} onClick={()=>removePost(editTgt.id)}>Remove</button></div></Modal>}
    </div>
  );
}

// ── CAMPAIGN LIST ──────────────────────────────────────────
function CampaignList({dbData,onDbChange,cfg}){
  const camps=dbData.campaigns||[];
  const[modal,setModal]=useState(null);
  const[editTgt,setEditTgt]=useState(null);
  const[del,setDel]=useState(null);
  const create=f=>{const c={...f,id:uid(),createdAt:Date.now()};onDbChange({...dbData,campaigns:[...camps,c]});setModal(null);location.hash="/campaign/"+c.id};
  const update=f=>{onDbChange({...dbData,campaigns:camps.map(c=>c.id===editTgt.id?{...c,...f}:c)});setModal(null);setEditTgt(null)};
  const remove=cid=>{const posts={...(dbData.posts||{})};delete posts[cid];onDbChange({...dbData,campaigns:camps.filter(c=>c.id!==cid),posts});setDel(null)};
  return(
    <div className="page">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"2rem",flexWrap:"wrap",gap:12}}>
        <div><h1 style={{fontSize:28,fontWeight:800,letterSpacing:"-.5px"}}><span style={{color:GOLD}}>✦</span> Creator Campaigns</h1><p style={{color:"var(--t2)",marginTop:4,fontSize:13}}>Live metrics via RapidAPI · Synced across all devices · Chartex embedded</p></div>
        <button className="bg" onClick={()=>setModal("create")}>+ New Campaign</button>
      </div>
      {camps.length===0?(
        <div className="card" style={{padding:"5rem 2rem",textAlign:"center"}}>
          <div style={{fontSize:44,color:GOLD,marginBottom:18}}>✦</div>
          <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>No campaigns yet</h2>
          <p style={{fontSize:13,color:"var(--t2)",maxWidth:460,margin:"0 auto 20px",lineHeight:1.7}}>Create a campaign with your TikTok sound URL, Instagram audio URL, Spotify track, and Chartex song URL. Then paste creator post links to pull live metrics automatically.</p>
          <button className="bg" onClick={()=>setModal("create")}>Create Campaign</button>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
          {camps.map(c=>(
            <div key={c.id} className="card pad" style={{cursor:"pointer",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.35)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--b1)"} onClick={()=>location.hash="/campaign/"+c.id}>
              <div style={{display:"flex",gap:12,marginBottom:12}}>
                <div style={{width:42,height:42,borderRadius:8,background:"var(--ga)",border:".5px solid var(--gb)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:GOLD,fontSize:22}}>✦</span></div>
                <div style={{flex:1,minWidth:0}}><p style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</p><p style={{fontSize:12,color:"var(--t2)",marginTop:2}}>{c.artist}</p></div>
              </div>
              {c.desc&&<p style={{fontSize:12,color:"var(--t2)",lineHeight:1.5,marginBottom:10}}>{c.desc}</p>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {c.ttUrl&&<span className="tag" style={{background:"var(--ta)",color:TT}}><Tt s={9} c={TT}/>TikTok</span>}
                {c.igUrl&&<span className="tag" style={{background:"var(--ia)",color:IG}}><Ig s={9} c={IG}/>Instagram</span>}
                {c.spUrl&&<span className="tag" style={{background:"var(--sa)",color:SP}}><Sv s={9} c={SP}/>Spotify</span>}
                {c.cxUrl&&<span className="tag" style={{background:"var(--ta)",color:TT}}>Chartex Live</span>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:12,borderTop:".5px solid var(--b1)"}}>
                <span style={{fontSize:11,color:"var(--t3)"}}>{new Date(c.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
                <div style={{display:"flex",gap:6}}>
                  <button className="bo" style={{padding:"3px 9px",fontSize:11}} onClick={e=>{e.stopPropagation();setEditTgt(c);setModal("edit")}}><Pn s={10}/>Edit</button>
                  <button className="bo" style={{padding:"3px 9px",fontSize:11,color:"var(--t3)"}} onClick={e=>{e.stopPropagation();setDel(c.id)}}>Delete</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {modal==="create"&&<Modal title="New Campaign" onClose={()=>setModal(null)} mw={600}><CampForm onSubmit={create} onClose={()=>setModal(null)}/></Modal>}
      {modal==="edit"&&editTgt&&<Modal title="Edit Campaign" onClose={()=>{setModal(null);setEditTgt(null)}} mw={600}><CampForm init={editTgt} onSubmit={update} onClose={()=>{setModal(null);setEditTgt(null)}}/></Modal>}
      {del&&<Modal title="Delete Campaign?" onClose={()=>setDel(null)} mw={400}><p style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Delete this campaign and all its posts?</p><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button className="bo" onClick={()=>setDel(null)}>Cancel</button><button className="bg" style={{background:"var(--red)"}} onClick={()=>remove(del)}>Delete</button></div></Modal>}
    </div>
  );
}

// ── APP — loads config from server, then data from JSONbin ──
function App(){
  const[hash,setHash]=useState(location.hash||"");
  const[cfg,setCfg]=useState(null);       // loaded from /config
  const[dbData,setDbData]=useState(null); // loaded from JSONbin
  const[ready,setReady]=useState(false);
  const saving=useRef(false);

  useEffect(()=>{
    (async()=>{
      // 1. Fetch credentials from the server (Render env vars)
      let serverCfg={};
      try{
        const r=await fetch("/config");
        if(r.ok)serverCfg=await r.json();
      }catch{}
      setCfg(serverCfg);

      // 2. Load campaign data from JSONbin (works on any device)
      let data=null;
      if(serverCfg.jbKey&&serverCfg.jbBin){
        data=await jbRead(serverCfg.jbKey,serverCfg.jbBin);
      }
      // Fallback to local cache if JSONbin not set up yet
      if(!data)data=lc("db_cache",{campaigns:[],posts:{}});
      else lw("db_cache",data); // update local cache

      setDbData(data);
      setReady(true);
    })();

    const h=()=>setHash(location.hash||"");
    window.addEventListener("hashchange",h);
    return()=>window.removeEventListener("hashchange",h);
  },[]);

  // Save to JSONbin + local cache on every change
  const onDbChange=useCallback(async updated=>{
    setDbData(updated);
    lw("db_cache",updated);
    if(cfg?.jbKey&&cfg?.jbBin&&!saving.current){
      saving.current=true;
      await jbWrite(cfg.jbKey,cfg.jbBin,updated);
      saving.current=false;
    }
  },[cfg]);

  if(!ready||!cfg||!dbData){
    return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"var(--t3)",fontSize:13,flexDirection:"column",gap:12}}>
      <div className="spin" style={{width:20,height:20,border:"2px solid rgba(255,255,255,0.1)",borderTopColor:GOLD,borderRadius:"50%"}}></div>
      Connecting…
    </div>;
  }

  const h=(hash||"").replace("#","");
  let page;
  if(h.startsWith("/campaign/")){const id=h.split("/")[2];page=<Dashboard id={id} ro={false} cfg={cfg} dbData={dbData} onDbChange={onDbChange}/>}
  else if(h.startsWith("/view/")){const id=h.split("/")[2];page=<Dashboard id={id} ro={true} cfg={cfg} dbData={dbData} onDbChange={onDbChange}/>}
  else page=<CampaignList dbData={dbData} onDbChange={onDbChange} cfg={cfg}/>;

  return page;
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}catch(e){
  document.getElementById("root").innerHTML=`<div style="color:#e53e3e;padding:2rem;font-family:sans-serif;background:#111"><h2 style="margin-bottom:8px">Error</h2><pre style="font-size:12px;opacity:.7">${e.message}</pre></div>`;
}
</script>
</body>
</html>
